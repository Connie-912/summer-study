            render();
          } else {
            err.textContent = (res.d && res.d.error) || '账号或密码错误';
            btn.disabled = false; btn.textContent = '登 录';
          }
        })
        .catch(function () {
          err.textContent = '网络异常，请稍后重试';
          btn.disabled = false; btn.textContent = '登 录';
        });
    }
    document.getElementById('lgBtn').addEventListener('click', doLogin);
    gate.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
    setTimeout(function () { var i = document.getElementById('lgUser'); if (i) i.focus(); }, 100);
  }

  /* ---------- 云同步 ---------- */
  var syncTimer = null;
  var syncing = false;
  var lastSyncAt = 0;
  var lastSyncError = '';

  function uploadState() {
    if (!getToken() || syncing) return;
    syncing = true;
    state.syncedAt = Date.now();
    var copy = JSON.parse(JSON.stringify(state));
    copy.config = Object.assign({}, copy.config, { apiKey: '', apiEndpoint: '' }); // 凭据不上云
    fetch('/api/sync/' + SYNC_CODE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify(copy)
    }).then(function (r) {
      syncing = false;
      if (r.ok) { lastSyncAt = Date.now(); lastSyncError = ''; }
      else { lastSyncError = '同步失败(' + r.status + ')'; }
      updateSyncCard();
    }).catch(function () {
      syncing = false;
      lastSyncError = '网络异常，待会会自动重试';
      updateSyncCard();
    });
  }

  function scheduleUpload() {
    if (!getToken()) return;
    if (syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(uploadState, 2000);
  }

  function downloadState() {
    return fetch('/api/sync/' + SYNC_CODE, {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    }).then(function (r) { return r.ok ? r.json() : null; })
      .then(function (remote) {
        if (remote && typeof remote === 'object') {
          var rt = remote.syncedAt || 0;
          var lt = state.syncedAt || 0;
          if (rt > lt) {
            var token = getToken();
            state = Object.assign({}, DEFAULT_STATE, remote);
            state.config = Object.assign({}, DEFAULT_STATE.config, remote.config || {});
            state.examSettings = Object.assign({}, DEFAULT_STATE.examSettings, remote.examSettings || {});
            state.config.apiKey = token;
            state.config.apiEndpoint = location.origin + '/api/ai';
            try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
            render();
          }
        } else {
          uploadState(); // 云端还没有数据，把本地推上去
        }
      }).catch(function () {});
  }

  function bootSync() {
    applyBackendConfig();
    downloadState();
  }

  // 包装 saveState：每次保存后防抖上传（登录后生效）
  var _origSave = window.saveState;
  window.saveState = function () {
    _origSave();
    scheduleUpload();
  };

  /* ---------- 「我的」页：AI状态 + 云同步卡 + 退出登录 ---------- */
  function fmtTime(ts) {
    if (!ts) return '还未同步';
    var d = new Date(ts);
    function p(n) { return (n < 10 ? '0' : '') + n; }
    return (d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  }

  function updateSyncCard() {
    var el = document.getElementById('syncStatusText');
    if (!el) return;
    el.textContent = lastSyncError ? ('⚠️ ' + lastSyncError) : ('上次同步：' + fmtTime(lastSyncAt));
  }

  window.syncNow = function () { lastSyncError = ''; uploadState(); updateSyncCard(); };
  window.logoutAccount = function () {
    if (!confirm('退出登录后会回到登录页，学习数据已保存在云端。确定退出吗？')) return;
    clearToken();
    location.reload();
  };

  var _origRenderMe = window.renderMe;
  window.renderMe = function () {
    _origRenderMe();
    if (!getToken()) return;
    var el = document.getElementById('tab-me');
    if (!el) return;

    // 1) 改写 AI 设置卡为「在线AI已就绪」，隐藏手动配置区
    var cards = el.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) {
      var title = cards[i].querySelector('.card-title');
      if (title && title.textContent.indexOf('AI') >= 0 && title.textContent.indexOf('设置') >= 0) {
        cards[i].innerHTML =
          '<div class="card-title">🤖 在线 AI 老师</div>' +
          '<div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">✅ 已接入在线 AI（DeepSeek），无需任何配置，答疑、讲课、出卷开箱即用。<br><span style="color:var(--text-light);font-size:12px;">AI 服务由平台统一提供，密钥已安全托管在服务端。</span></div>';
        var settingsDiv = cards[i].nextElementSibling;
        if (settingsDiv && settingsDiv.querySelector('#apiKeyInput')) settingsDiv.style.display = 'none';
        break;
      }
    }

    // 2) 注入云同步卡（放在「数据管理」之前）
    if (!el.querySelector('#cloudSyncCard')) {
      var dataCard = null;
      for (var j = 0; j < cards.length; j++) {
        var t2 = cards[j].querySelector('.card-title');
        if (t2 && t2.textContent.indexOf('数据管理') >= 0) { dataCard = cards[j]; break; }
      }
      var syncCard = document.createElement('div');
      syncCard.className = 'card';
      syncCard.id = 'cloudSyncCard';
      syncCard.innerHTML =
        '<div class="card-title">☁️ 云同步</div>' +
        '<div id="syncStatusText" style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">上次同步：' + fmtTime(lastSyncAt) + '</div>' +
        '<div style="font-size:12px;color:var(--text-light);margin-bottom:12px;">学习进度、成绩、聊天记录会自动同步到云端，换设备登录同一账号即可继续学习。</div>' +
        '<button class="btn btn-outline btn-block" onclick="syncNow()">立即同步</button>';
      if (dataCard) el.insertBefore(syncCard, dataCard); else el.appendChild(syncCard);

      // 3) 退出登录按钮（放在版本卡之前）
      var logoutCard = document.createElement('div');
      logoutCard.className = 'card';
      logoutCard.innerHTML = '<button class="btn btn-danger btn-block" onclick="logoutAccount()">退出登录</button>';
      el.insertBefore(logoutCard, syncCard.nextSibling);
    }
    updateSyncCard();
  };

  /* ---------- 启动 ---------- */
  if (!getToken()) {
    showLoginGate();
  } else {
    bootSync();
  }
})();

/* ================================================================
   版本检测：线上有新版本时提示刷新，避免旧页面卡住
   ================================================================ */
(function () {
  if (location.protocol.indexOf('http') !== 0) return;
  var APP_VERSION = '2026.07.23.3';
  var shown = false;
  function check() {
    fetch('/api/health', { cache: 'no-store' }).then(function (r) { return r.json(); })
      .then(function (d) {
        if (shown || !d || !d.version || d.version === APP_VERSION) return;
        shown = true;
        var bar = document.createElement('div');
        bar.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:99998;background:#1e3a8a;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;box-shadow:0 8px 24px rgba(2,12,45,.35);cursor:pointer;font-family:inherit;';
        bar.textContent = '✨ 已有新版本，点我立即更新';
        bar.onclick = function () { location.reload(); };
        document.body.appendChild(bar);
      }).catch(function () {});
  }
  setTimeout(check, 5000);
  setInterval(check, 60000);
})();
</script>
</body>
</html>
