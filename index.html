/* ================================================================
   云端模块：账号登录门 + 云同步 + 在线AI固定接入 + 9位老师多音色
   仅在 http(s) 在线模式启用；本地 file:// 双击打开时自动跳过，
   保持纯本地单机可用。
   ================================================================ */
(function () {
  var ONLINE = location.protocol.indexOf('http') === 0;
  var AUTH_KEY = 'studyAuth';
  var SYNC_CODE = 'main';

  /* ---------- 多音色语音：9位老师9种声音 ---------- */
  var VOICE_MAP = {
    chinese:   { prefs: [/Xiaoxiao/i, /Yaoyao/i],                       pitch: 1.00, rate: 0.95 },
    math:      { prefs: [/Yunjian/i, /Yunyang/i, /Kangkang/i],          pitch: 0.95, rate: 1.00 },
    english:   { prefs: [/Xiaoyi/i, /Xiaohan/i, /Google \u666e\u901a\u8bdd/i], pitch: 1.15, rate: 1.05 },
    physics:   { prefs: [/Yunyang/i, /Yunxi/i, /Kangkang/i],            pitch: 1.05, rate: 1.00 },
    chemistry: { prefs: [/Yunxia/i, /Xiaomo/i, /Huihui/i],              pitch: 0.95, rate: 0.98 },
    biology:   { prefs: [/Xiaobei/i, /Xiaoni/i, /Huihui/i],             pitch: 1.10, rate: 1.02 },
    history:   { prefs: [/Yunze/i, /Yunfeng/i, /Kangkang/i],            pitch: 0.85, rate: 0.95 },
    politics:  { prefs: [/Xiaomo/i, /Xiaorui/i, /Yaoyao/i],             pitch: 1.08, rate: 1.02 },
    geography: { prefs: [/Yunxi/i, /Yunze/i, /Kangkang/i],              pitch: 1.00, rate: 1.05 }
  };
  var FALLBACK_PITCH = { chinese: 1.0, math: 0.9, english: 1.2, physics: 1.0, chemistry: 0.92, biology: 1.12, history: 0.85, politics: 1.06, geography: 1.0 };

  function pickTeacherVoice(teacherId) {
    var conf = VOICE_MAP[teacherId] || { prefs: [], pitch: 1.0, rate: 1.0 };
    var voices = ('speechSynthesis' in window) ? speechSynthesis.getVoices() : [];
    var zh = voices.filter(function (v) { return (v.lang || '').toLowerCase().indexOf('zh') === 0; });
    for (var i = 0; i < conf.prefs.length; i++) {
      var hit = zh.find(function (v) { return conf.prefs[i].test(v.name); });
      if (hit) return { voice: hit, pitch: conf.pitch, rate: teacherRate(conf) };
    }
    return { voice: zh[0] || null, pitch: (FALLBACK_PITCH[teacherId] || conf.pitch), rate: teacherRate(conf) };
  }

  // 全局语速放慢（孩子反馈太快）：所有音色 rate ×0.88，下限 0.8
  function teacherRate(conf) { return Math.max(0.8, (conf.rate || 1.0) * 0.88); }

  // 重新定义朗读：按当前老师选择不同音色（讲课与答疑共用此入口）
  window.speakMessage = function (msgId, btnEl) {
    if (typeof currentUtterance !== 'undefined' && currentUtterance) {
      speechSynthesis.cancel();
      if (currentTTSBtn) {
        currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
        currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
        currentTTSBtn.classList.remove('speaking');
      }
      if (currentTTSBtn === btnEl) { currentUtterance = null; currentTTSBtn = null; return; }
    }
    var msgEl = document.getElementById(msgId);
    if (!msgEl) return;
    var clone = msgEl.cloneNode(true);
    var ttsBar = clone.querySelector('.tts-bar');
    if (ttsBar) ttsBar.remove();
    var text = clone.textContent || clone.innerText || '';
    if (!text.trim()) return;

    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    var picked = pickTeacherVoice(state.currentTeacher || '');
    if (picked.voice) utterance.voice = picked.voice;
    utterance.pitch = picked.pitch;
    utterance.rate = picked.rate;

    btnEl.querySelector('.tts-label').textContent = '停止';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128263;';
    btnEl.classList.add('speaking');
    currentUtterance = utterance;
    currentTTSBtn = btnEl;
    utterance.onend = utterance.onerror = function () {
      btnEl.querySelector('.tts-label').textContent = '朗读';
      btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
      btnEl.classList.remove('speaking');
      currentUtterance = null;
      currentTTSBtn = null;
    };
    speechSynthesis.speak(utterance);
  };

  /* ---------- 自动朗读：老师回复即播报，可暂停/继续/停止 ---------- */
  var ttsFloatEl = null, ttsSpeaking = false, ttsPaused = false;

  function isAutoTTS() { return !(state.config && state.config.autoTTS === false); }

  function ensureTTSFloat() {
    if (ttsFloatEl && document.body.contains(ttsFloatEl)) return;
    ttsFloatEl = document.createElement('div');
    ttsFloatEl.id = 'ttsFloat';
    ttsFloatEl.style.cssText = 'position:fixed;right:14px;bottom:14px;z-index:88888;display:none;align-items:center;gap:8px;background:#1e3a8a;color:#fff;padding:8px 10px 8px 14px;border-radius:24px;box-shadow:0 4px 16px rgba(15,23,42,.35);font-size:13px;';
    ttsFloatEl.innerHTML =
      '<span id="ttsFloatLabel">🔊 朗读中</span>' +
      '<button id="ttsPauseBtn" title="暂停/继续" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;cursor:pointer;">⏸</button>' +
      '<button id="ttsStopBtn" title="停止朗读" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;cursor:pointer;">⏹</button>';
    document.body.appendChild(ttsFloatEl);
    document.getElementById('ttsPauseBtn').onclick = function () {
      if (!ttsSpeaking) return;
      var label = document.getElementById('ttsFloatLabel');
      if (ttsPaused) {
        try { speechSynthesis.resume(); } catch (e) {}
        ttsPaused = false; this.textContent = '⏸'; label.textContent = '🔊 朗读中';
      } else {
        try { speechSynthesis.pause(); } catch (e) {}
        ttsPaused = true; this.textContent = '▶'; label.textContent = '⏸ 已暂停';
      }
    };
    document.getElementById('ttsStopBtn').onclick = function () { window.stopTTS(); };
  }

  function showTTSFloat() { ensureTTSFloat(); ttsFloatEl.style.display = 'flex'; }
  function hideTTSFloat() {
    if (ttsFloatEl) ttsFloatEl.style.display = 'none';
    var p = document.getElementById('ttsPauseBtn');
    if (p) p.textContent = '⏸';
    ttsPaused = false; ttsSpeaking = false;
  }

  window.stopTTS = function () {
    ttsQueue.length = 0;
    try { speechSynthesis.cancel(); } catch (e) {}
    if (typeof currentTTSBtn !== 'undefined' && currentTTSBtn) {
      currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
      currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
      currentTTSBtn.classList.remove('speaking');
      currentTTSBtn = null;
    }
    if (typeof currentUtterance !== 'undefined') currentUtterance = null;
    hideTTSFloat();
  };

  /* ---------- 句子队列朗读：边出字边讲（流式跟读） ---------- */
  var ttsQueue = [];

  // 舞台指示（动作/神态描写）只留在后台，不朗读也不显示
  const STAGE_RE = /[（(][^（）()]{0,30}(?:含笑|轻叩|微笑|点头|摇头|皱眉|眨眼|叹气|挥手|转身|停顿|沉吟|语重心长|忍俊不禁|轻笑|笑着说|说道|想了想|看着|拿起|放下|敲了敲|拍了拍|神秘一笑|欣慰|鼓励地|温柔地|严肃地|认真地)[^（）()]{0,30}[)）]/g;
  function cleanStageText(s) {
    return String(s).replace(STAGE_RE, '').replace(/\*[^*]{2,40}\*/g, '').replace(/ {2,}/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
  }
  function cleanTTSText(s) {
    return cleanStageText(s).replace(/[#*>`|\[\]]/g, '').replace(/【|】/g, '').replace(/\s+/g, ' ').trim();
  }
  window.cleanStageText = cleanStageText;
  window.getToken = getToken;
  window.authExpired = authExpired;

  function pumpTTS() {
    if (ttsSpeaking || !ttsQueue.length) return;
    if (!('speechSynthesis' in window)) { ttsQueue.length = 0; return; }
    var text = ttsQueue.shift();
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    var picked = pickTeacherVoice(state.currentTeacher || '');
    if (picked.voice) utterance.voice = picked.voice;
    utterance.pitch = picked.pitch;
    utterance.rate = picked.rate;
    ttsSpeaking = true; ttsPaused = false;
    showTTSFloat();
    utterance.onend = utterance.onerror = function () {
      ttsSpeaking = false;
      if (ttsQueue.length) { pumpTTS(); }
      else { hideTTSFloat(); if (typeof currentUtterance !== 'undefined') currentUtterance = null; }
    };
    currentUtterance = utterance;
    try { speechSynthesis.speak(utterance); } catch (e) { ttsSpeaking = false; hideTTSFloat(); }
  }

  // 流式增量入队：把新到的文本按句切开，完整句子立即朗读
  window.autoSpeakEnqueue = function (fragment) {
    if (!isAutoTTS()) return;
    var clean = cleanTTSText(fragment);
    if (!clean) return;
    if (clean.length > 220) {  // 超长句再按逗号切，避免一句读太久
      var parts = clean.split(/(?<=[，、：])/);
      var buf = '';
      for (var i = 0; i < parts.length; i++) {
        buf += parts[i];
        if (buf.length > 90) { ttsQueue.push(buf); buf = ''; }
      }
      if (buf) ttsQueue.push(buf);
    } else {
      ttsQueue.push(clean);
    }
    pumpTTS();
  };

  // 整段文本（欢迎语/离线回复）：切句后入队
  window.autoSpeakReply = function (text) {
    if (!isAutoTTS()) return;
    if (!('speechSynthesis' in window)) return;
    if (!text || !text.trim()) return;
    window.stopTTS();
    var segs = String(text).split(/(?<=[。！？；!?:;])|\n+/);
    for (var i = 0; i < segs.length; i++) {
      if (segs[i] && segs[i].trim()) window.autoSpeakEnqueue(segs[i]);
    }
  };

  window.toggleAutoTTS = function () {
    if (!state.config) state.config = {};
    state.config.autoTTS = !isAutoTTS();
    try { saveState(); } catch (e) {}
    if (!state.config.autoTTS) window.stopTTS();
    var b = document.getElementById('autoTTSBtn');
    if (b) {
      var on = isAutoTTS();
      b.textContent = on ? '🔊' : '🔇';
      b.title = '自动朗读：' + (on ? '已开启，点我关闭' : '已关闭，点我开启');
      b.style.background = on ? '' : '#94a3b8';
    }
  };

  if (!ONLINE) return; // 本地模式到此为止

  /* ---------- 在线模式：固定接入后端 ---------- */
  function getToken() { try { return localStorage.getItem(AUTH_KEY) || ''; } catch (e) { return ''; } }
  function setToken(t) { try { localStorage.setItem(AUTH_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(AUTH_KEY); } catch (e) {} }

  function applyBackendConfig() {
    var t = getToken();
    if (!t) return;
    state.config.apiEndpoint = location.origin + '/api/ai';
    state.config.apiKey = t;
    // 老设备兜底：仅管理员（登录时已打标）补种历史默认成绩，普通用户保持空白自己填
    if (localStorage.getItem('studyAdmin') === '1' && !hasAnyScore()) {
      state.scores = Object.assign({}, LEGACY_SCORES);
    }
    try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
  }

  /* ---------- 登录/注册遮罩（多用户） ---------- */
  function showLoginGate() {
    if (document.getElementById('loginGate')) return;
    var gate = document.createElement('div');
    gate.id = 'loginGate';
    gate.innerHTML =
      '<div style="position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0f766e 0%,#0e7490 45%,#0891b2 100%);display:flex;align-items:center;justify-content:center;padding:24px;">' +
        '<div style="width:100%;max-width:380px;background:#ffffff;border-radius:20px;padding:36px 32px 28px;box-shadow:0 24px 64px rgba(15,118,110,.4);">' +
          '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="width:64px;height:64px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,#0e7490,#0891b2);display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 4px 12px rgba(8,145,178,.3);">🧠</div>' +
            '<div style="font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.3px;">AI智能学伴</div>' +
            '<div style="font-size:13px;color:#64748b;margin-top:6px;line-height:1.5;">每位同学一个专属空间<br>学习记录云端保存，缺啥补啥</div>' +
          '</div>' +
          '<div style="text-align:center;font-size:13px;color:#64748b;background:#f0f9ff;border-radius:10px;padding:9px 12px;margin-bottom:18px;">账号由管理员统一开通 · 没有账号请联系课程老师</div>' +
          '<label style="font-size:13px;color:#334155;font-weight:600;">用户名</label>' +
          '<input id="lgUser" type="text" autocomplete="username" placeholder="手机号或字母数字均可" style="width:100%;box-sizing:border-box;margin:6px 0 12px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;">' +
          '<label style="font-size:13px;color:#334155;font-weight:600;">密码</label>' +
          '<input id="lgPass" type="password" autocomplete="current-password" placeholder="至少6位" style="width:100%;box-sizing:border-box;margin:6px 0 8px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;">' +
          '<div id="lgErr" style="min-height:20px;font-size:12px;color:#dc2626;margin-bottom:6px;"></div>' +
          '<button id="lgBtn" style="width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#0e7490,#0891b2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;">登 录</button>' +

          '<div style="text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9;">' +
            '<button id="lgGuestBtn" style="background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;text-decoration:underline;">🐾 先看看，不登录</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(gate);

    var btn = document.getElementById('lgBtn');

    function afterAuth(d) {
      setToken(d.token);
      if (d.admin) {
        try { localStorage.setItem('studyAdmin', '1'); } catch (e) {}
      } else {
        try { localStorage.removeItem('studyAdmin'); } catch (e) {}
      }
      // 成绩不播种：每位同学自己填（仅管理员账号补种历史默认成绩，兼容老设备）
      if (d.admin && !hasAnyScore()) {
        state.scores = Object.assign({}, LEGACY_SCORES);
      }
      if (d.name) {
        if (!state.config) state.config = {};
        state.config.nickname = d.name;
        try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
      }
      if (d.grade) {
        state.grade = d.grade;
        try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
      }
      applyBackendConfig();
      gate.remove();
      bootSync();
      render();
    }

    function doSubmit() {
      var u = document.getElementById('lgUser').value.trim();
      var p = document.getElementById('lgPass').value;
      var err = document.getElementById('lgErr');
      if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
      var body = { user: u, pass: p };
      btn.disabled = true; btn.textContent = '登录中…'; err.textContent = '';
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
        .then(function (res) {
          if (res.ok && res.d && res.d.ok && res.d.token) {
            afterAuth(res.d);
          } else {
            err.textContent = (res.d && res.d.error) || '账号或密码错误';
            btn.disabled = false; btn.textContent = '登 录';
          }
        })
        .catch(function () {
          err.textContent = '网络异常，请稍后重试';
          btn.disabled = false; btn.textContent = '登 录';
        });
    }
    btn.addEventListener('click', doSubmit);
    document.getElementById('lgGuestBtn').addEventListener('click', function () {
      gate.remove();
      state.config.nickname = '访客';
      state.grade = state.grade || '高一';
      try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
      render();
      // 游客提示条
      var tip = document.createElement('div');
      tip.id = 'guestTip';
      tip.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99998;background:#0891b2;color:#fff;text-align:center;padding:8px 16px;font-size:13px;display:flex;align-items:center;justify-content:center;';
      tip.innerHTML = '🐾 游客体验 · AI 每日限 15 次 · 数据仅存本机，注册解锁完整功能 <button onclick="document.getElementById(\'guestTip\').remove();showLoginGate()" style="background:rgba(255,255,255,0.2);border:none;border-radius:6px;color:#fff;padding:4px 10px;margin-left:8px;cursor:pointer;font-size:12px;">注册/登录</button>';
      document.body.prepend(tip);
      var h = document.querySelector('.header');
      if (h) h.style.marginTop = '0';
    });
    gate.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSubmit(); });
    setTimeout(function () { var i = document.getElementById('lgUser'); if (i) i.focus(); }, 100);
  }

  /* ---------- 云同步 ---------- */
  var syncTimer = null;
  var syncing = false;
  var lastSyncAt = 0;
  var lastSyncError = '';

  function uploadState() {
    if (!getToken() || syncing) return;
    syncing = true;
    state.syncedAt = Date.now();
    var copy = JSON.parse(JSON.stringify(state));
    copy.config = Object.assign({}, copy.config, { apiKey: '', apiEndpoint: '' }); // 凭据不上云
    fetch('/api/sync/' + SYNC_CODE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify(copy)
    }).then(function (r) {
      syncing = false;
      if (r.status === 401) { authExpired(); return; }
      if (r.ok) { lastSyncAt = Date.now(); lastSyncError = ''; }
      else { lastSyncError = '同步失败(' + r.status + ')'; }
      updateSyncCard();
    }).catch(function () {
      syncing = false;
      lastSyncError = '网络异常，待会会自动重试';
      updateSyncCard();
    });
  }

  function scheduleUpload() {
    if (!getToken()) return;
    if (syncTimer) clearTimeout(syncTimer);
    syncTimer = setTimeout(uploadState, 2000);
  }

  function authExpired() {
    clearToken();
    try { localStorage.removeItem('studyAdmin'); } catch (e) {}
    showLoginGate();
  }

  function downloadState() {
    return fetch('/api/sync/' + SYNC_CODE, {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    }).then(function (r) { if (r.status === 401) { authExpired(); return null; } return r.ok ? r.json() : null; })
      .then(function (remote) {
        if (remote && typeof remote === 'object') {
          var rt = remote.syncedAt || 0;
          var lt = state.syncedAt || 0;
          if (rt > lt) {
            var token = getToken();
            state = Object.assign({}, DEFAULT_STATE, remote);
            state.config = Object.assign({}, DEFAULT_STATE.config, remote.config || {});
            state.examSettings = Object.assign({}, DEFAULT_STATE.examSettings, remote.examSettings || {});
            state.config.apiKey = token;
            state.config.apiEndpoint = location.origin + '/api/ai';
            try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
            render();
          }
        } else {
          uploadState(); // 云端还没有数据，把本地推上去
        }
      }).catch(function () {});
  }

  function bootSync() {
    applyBackendConfig();
    downloadState();
  }

  // 包装 saveState：每次保存后防抖上传（登录后生效）
  var _origSave = window.saveState;
  window.saveState = function () {
    _origSave();
    scheduleUpload();
  };

  /* ---------- 「我的」页：AI状态 + 云同步卡 + 退出登录 ---------- */
  function fmtTime(ts) {
    if (!ts) return '还未同步';
    var d = new Date(ts);
    function p(n) { return (n < 10 ? '0' : '') + n; }
    return (d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  }

  function updateSyncCard() {
    var el = document.getElementById('syncStatusText');
    if (!el) return;
    el.textContent = lastSyncError ? ('⚠️ ' + lastSyncError) : ('上次同步：' + fmtTime(lastSyncAt));
  }

  window.syncNow = function () { lastSyncError = ''; uploadState(); updateSyncCard(); };
  window.logoutAccount = function () {
    if (!confirm('退出登录后会回到登录页，学习数据已保存在云端。确定退出吗？')) return;
    clearToken();
    location.reload();
  };

  var _origRenderMe = window.renderMe;
  window.renderMe = function () {
    _origRenderMe();
    if (!getToken()) return;
    var el = document.getElementById('tab-me');
    if (!el) return;

    // 1) 改写 AI 设置卡为「在线AI已就绪」，隐藏手动配置区
    var cards = el.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) {
      var title = cards[i].querySelector('.card-title');
      if (title && title.textContent.indexOf('AI') >= 0 && title.textContent.indexOf('设置') >= 0) {
        cards[i].innerHTML =
          '<div class="card-title">🤖 在线 AI 老师</div>' +
          '<div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">✅ 已接入在线 AI（DeepSeek），无需任何配置，答疑、讲课、出卷开箱即用。<br><span style="color:var(--text-light);font-size:12px;">AI 服务由平台统一提供，密钥已安全托管在服务端。</span></div>';
        var settingsDiv = cards[i].nextElementSibling;
        if (settingsDiv && settingsDiv.querySelector('#apiKeyInput')) settingsDiv.style.display = 'none';
        break;
      }
    }

    // 2) 注入云同步卡（放在「数据管理」之前）
    if (!el.querySelector('#cloudSyncCard')) {
      var dataCard = null;
      for (var j = 0; j < cards.length; j++) {
        var t2 = cards[j].querySelector('.card-title');
        if (t2 && t2.textContent.indexOf('数据管理') >= 0) { dataCard = cards[j]; break; }
      }
      var syncCard = document.createElement('div');
      syncCard.className = 'card';
      syncCard.id = 'cloudSyncCard';
      syncCard.innerHTML =
        '<div class="card-title">☁️ 云同步</div>' +
        '<div id="syncStatusText" style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">上次同步：' + fmtTime(lastSyncAt) + '</div>' +
        '<div style="font-size:12px;color:var(--text-light);margin-bottom:12px;">学习进度、成绩、聊天记录会自动同步到云端，换设备登录同一账号即可继续学习。</div>' +
        '<button class="btn btn-outline btn-block" onclick="syncNow()">立即同步</button>';
      if (dataCard) el.insertBefore(syncCard, dataCard); else el.appendChild(syncCard);

      // 3) 退出登录按钮（放在版本卡之前）
      var logoutCard = document.createElement('div');
      logoutCard.className = 'card';
      logoutCard.innerHTML = '<button class="btn btn-danger btn-block" onclick="logoutAccount()">退出登录</button>';
      el.insertBefore(logoutCard, syncCard.nextSibling);
    }
    updateSyncCard();
  };

  /* ---------- 启动 ---------- */
  if (!getToken()) {
    showLoginGate();
  } else {
    bootSync();
  }
})();

/* ================================================================
   版本检测：线上有新版本时提示刷新，避免旧页面卡住
   ================================================================ */
(function () {
  if (location.protocol.indexOf('http') !== 0) return;
  var APP_VERSION = '2026.07.24.3';
  var shown = false;
  function check() {
    fetch('/api/health', { cache: 'no-store' }).then(function (r) { return r.json(); })
      .then(function (d) {
        if (shown || !d || !d.version || d.version === APP_VERSION) return;
        shown = true;
        var bar = document.createElement('div');
        bar.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:99998;background:linear-gradient(135deg,#0e7490,#0891b2);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;box-shadow:0 8px 24px rgba(8,145,178,.35);cursor:pointer;font-family:inherit;';
        bar.textContent = '✨ 已有新版本，点我立即更新';
        bar.onclick = function () { location.reload(); };
        document.body.appendChild(bar);
      }).catch(function () {});
  }
  setTimeout(check, 5000);
  setInterval(check, 60000);
})();
</script>
</body>
