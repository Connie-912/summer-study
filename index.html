<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能学伴</title>
<style>
/* ========== CSS 变量 ========== */
:root {
  --primary: #0891b2;
  --primary-light: #22d3ee;
  --primary-dark: #0e7490;
  --primary-soft: #ecfeff;
  --primary-softer: #f0fdfa;
  --accent: #0d9488;
  --accent-light: #5eead4;
  --bg: #f0f9ff;
  --card: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --gradient-primary: linear-gradient(135deg, #0e7490, #0891b2);
  --gradient-header: linear-gradient(135deg, #0f766e, #0891b2);
  --gradient-warm: linear-gradient(135deg, #0d9488, #22d3ee);
  --gradient-green: linear-gradient(135deg, #059669, #10b981);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(8,145,178,0.06), 0 1px 2px rgba(8,145,178,0.04);
  --shadow-md: 0 4px 16px rgba(8,145,178,0.10);
  --shadow-lg: 0 8px 32px rgba(8,145,178,0.12);
  --tab-height: 56px;
  --header-height: 48px;
  --font: -apple-system, "PingFang SC", "SF Pro Display", "HarmonyOS Sans", "Helvetica Neue", sans-serif;
}

/* ========== 基础样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* 应用容器 - 网页版布局 */
.app-container {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

/* ========== 顶部标题栏 ========== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--header-height);
  background: var(--gradient-header);
  color: white;
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  font-size: 17px;
  font-weight: 600;
}

.header .back-btn {
  display: none;
  margin-right: 8px;
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.header .back-btn.show { display: flex; }

/* ========== 侧边导航栏（桌面端） ========== */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100vh;
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding-top: var(--header-height);
  z-index: 99;
  box-shadow: 1px 0 8px rgba(0,0,0,0.03);
}

.sidebar-logo {
  padding: 16px 20px 12px;
  font-size: 14px;
  font-weight: 700;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  border-bottom: 1px solid var(--border);
}

.sidebar-nav {
  flex: 1;
  padding: 8px;
  overflow-y: auto;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}

.sidebar-item:hover {
  background: var(--primary-soft);
  color: var(--primary-dark);
}

.sidebar-item.active {
  background: var(--gradient-primary);
  color: white;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(8,145,178,0.25);
}

.sidebar-item .si-icon {
  font-size: 20px;
  width: 28px;
  text-align: center;
}

.sidebar-footer {
  padding: 12px 20px;
  font-size: 11px;
  color: var(--text-light);
  border-top: 1px solid var(--border);
}

/* ========== 主内容区域 ========== */
.main-area {
  margin-left: 220px;
  padding-top: var(--header-height);
  padding-bottom: 24px;
  min-height: 100vh;
}

.content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px;
}

.tab-content {
  display: none;
  animation: fadeIn 0.25s ease;
}

.tab-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 底部Tab栏（仅移动端显示） ========== */
.tab-bar {
  display: none;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  color: var(--text-light);
  cursor: pointer;
  padding: 6px 8px;
  border: none;
  background: none;
  transition: color 0.2s;
  -webkit-user-select: none;
  user-select: none;
  flex: 1;
  min-width: 0;
}

.tab-item .tab-icon { font-size: 20px; line-height: 1; }
.tab-item.active { color: var(--primary); font-weight: 600; }

/* ========== 卡片通用样式 ========== */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 16px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

/* ========== 按钮 ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:active { transform: scale(0.97); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-soft); }

.btn-danger {
  background: var(--danger);
  color: white;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 6px;
}

.btn-block {
  width: 100%;
}

/* 上传区域 */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-area:hover {
  border-color: var(--primary);
  background: var(--primary-softer);
}

/* 诊断报告样式 */
.diagnosis-report {
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
}
.diagnosis-report h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  margin: 12px 0 6px;
}
.diagnosis-report p { margin-bottom: 8px; }
.diagnosis-report ul, .diagnosis-report ol {
  padding-left: 1.2rem;
  margin-bottom: 8px;
}
.diagnosis-report li { margin-bottom: 4px; }
.diagnosis-report table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}
.diagnosis-report th, .diagnosis-report td {
  border: 1px solid var(--border);
  padding: 6px 8px;
  font-size: 12px;
  text-align: left;
}
.diagnosis-report th {
  background: var(--primary-softer);
  font-weight: 600;
}

/* 历史诊断项 */
.history-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--primary-softer); }

/* 成绩概览 */
.score-grid { display: flex; flex-direction: column; gap: 8px; }
.score-item { display: flex; align-items: center; gap: 10px; }
.score-subject { width: 90px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.score-priority { font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: 700; color: white; flex-shrink: 0; }
.score-p0 { background: var(--danger); }
.score-p1 { background: var(--warning); }
.score-p2 { background: var(--text-secondary); }
.score-p3 { background: var(--success); }
.score-bar-track { flex: 1; height: 20px; background: var(--primary-softer); border-radius: 10px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 10px; font-size: 11px; color: white; font-weight: 600; display: flex; align-items: center; padding-left: 8px; transition: width 0.5s ease; min-width: 30px; }

/* 科目分区标签 */
.group-label {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  background: var(--bg);
  margin: 8px 0 4px;
  border-radius: var(--radius);
}
.group-label-core { color: var(--primary); }
.group-label-extra { color: var(--success); }

/* loading动画 */
.loading-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.loading-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  animation: bounceDot 1.4s infinite ease-in-out both;
}
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounceDot {
  0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* ========== 首页样式 ========== */
.welcome-section {
  background: var(--gradient-header);
  color: white;
  padding: 24px 20px;
  margin: 0;
  border-radius: 0;
}

  .welcome-greeting {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .welcome-subtitle {
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 16px;
  }

  /* 年级徽章 */
  .grade-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 8px;
  }

.welcome-stats {
  display: flex;
  align-items: center;
  justify-content: space-around;
}

.stat-item { text-align: center; }

.stat-circle {
  width: 70px;
  height: 70px;
  position: relative;
}

.stat-circle svg {
  width: 70px;
  height: 70px;
  transform: rotate(-90deg);
}

.stat-circle .circle-bg {
  fill: none;
  stroke: rgba(255,255,255,0.2);
  stroke-width: 6;
}

.stat-circle .circle-progress {
  fill: none;
  stroke: white;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}

.stat-circle .circle-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  font-weight: 700;
}

.stat-info {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.85;
}

.streak-info {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}

.streak-info span {
  display: block;
  font-size: 11px;
  font-weight: 400;
  opacity: 0.85;
  margin-top: 2px;
}

/* 今日任务 */
.today-task {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.today-task:last-child { border-bottom: none; }

.task-info { flex: 1; }

.task-label {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}

.task-detail {
  font-size: 12px;
  color: var(--text-secondary);
}

/* 科目网格 */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 0;
  margin-bottom: 12px;
}

.subject-mini-card {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
}

.subject-mini-card:active { transform: scale(0.96); }

.subject-mini-card .emoji { font-size: 24px; margin-bottom: 4px; }
.subject-mini-card .name { font-size: 12px; font-weight: 500; margin-bottom: 6px; }

.mini-progress-bar {
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 2px;
}

.mini-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.subject-mini-card .progress-text { font-size: 10px; color: var(--text-secondary); }

/* 统计条 */
.stat-bar-item {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.stat-bar-label {
  font-size: 12px;
  width: 48px;
  text-align: right;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.stat-bar-track {
  flex: 1;
  height: 16px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  font-size: 9px;
  color: white;
  font-weight: 600;
  min-width: 28px;
}

/* ========== 科目Tab ========== */
.subject-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 8px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.subject-card:active { transform: scale(0.98); }

.subject-card .card-emoji { font-size: 32px; flex-shrink: 0; }

.subject-card-info { flex: 1; }

.subject-card-info .s-name {
  font-size: 15px;
  font-weight: 600;
}

.subject-card-info .s-teacher {
  font-size: 12px;
  color: var(--text-secondary);
}

.subject-card-right { text-align: right; flex-shrink: 0; }

.subject-card-right .s-percent {
  font-size: 16px;
  font-weight: 700;
}

.subject-card-right .s-arrow {
  color: var(--text-light);
  font-size: 18px;
}

.topic-dots {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  padding-left: 44px;
}

.topic-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all 0.3s;
}

.topic-dot.completed {
  background: var(--success);
  border-color: var(--success);
}

/* 科目详情 */
.detail-teacher-card {
  background: var(--primary-softer);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.detail-teacher-card .t-avatar { font-size: 40px; }
.detail-teacher-card .t-info .t-name { font-size: 16px; font-weight: 600; }
.detail-teacher-card .t-info .t-title { font-size: 12px; color: var(--text-secondary); }
.detail-teacher-card .t-info .t-style { font-size: 12px; color: var(--text-light); margin-top: 4px; }

.topic-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.topic-list-item:last-child { border-bottom: none; }

.topic-checkbox {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 14px;
  color: transparent;
}

.topic-checkbox.checked {
  background: var(--success);
  border-color: var(--success);
  color: white;
  animation: checkBounce 0.3s ease;
}

@keyframes checkBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.topic-info { flex: 1; }

.topic-info .t-num {
  font-size: 11px;
  color: var(--text-light);
}

.topic-info .t-name {
  font-size: 14px;
  font-weight: 500;
}

.topic-info .t-name.completed-text {
  text-decoration: line-through;
  color: var(--text-light);
}

.topic-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* ========== 出卷Tab ========== */
.exam-form-section {
  margin-bottom: 16px;
}

.exam-form-section label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.checkbox-group, .radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.checkbox-item, .radio-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  cursor: pointer;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: all 0.2s;
  background: white;
}

.checkbox-item.selected, .radio-item.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary-dark);
  font-weight: 500;
}

.checkbox-item input, .radio-item input { display: none; }

.exam-range {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  padding: 8px;
  background: var(--primary-softer);
  border-radius: 8px;
}

/* 试卷展示 */
.exam-paper {
  padding: 16px;
  margin: 12px 16px;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.exam-paper h2 {
  text-align: center;
  font-size: 18px;
  margin-bottom: 8px;
}

.exam-paper h3 {
  font-size: 14px;
  margin: 16px 0 8px;
  padding-left: 8px;
  border-left: 3px solid var(--primary);
}

.exam-paper p, .exam-paper li {
  font-size: 13px;
  line-height: 1.8;
}

.exam-paper ol, .exam-paper ul { padding-left: 20px; }

.answers-section {
  border-top: 2px dashed var(--border);
  margin-top: 16px;
  padding-top: 16px;
}

.loading-dots {
  display: inline-flex;
  gap: 4px;
  padding: 12px 16px;
}

.loading-dots span {
  width: 8px;
  height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: dotBounce 1.4s infinite ease-in-out both;
}

.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ========== 答疑Tab ========== */
.teacher-scroll {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.teacher-scroll::-webkit-scrollbar { display: none; }

.teacher-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  min-width: 72px;
}

.teacher-chip.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.teacher-chip .tc-avatar { font-size: 24px; }
.teacher-chip .tc-name { font-size: 11px; font-weight: 500; }
.teacher-chip .tc-subject { font-size: 10px; color: var(--text-secondary); }

/* 聊天区域 */
.chat-area {
  padding: 12px 16px;
  min-height: 400px;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* 语音朗读按钮 */
.tts-bar {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.08);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  color: var(--primary);
  border: 1px solid rgba(37, 99, 235, 0.15);
}
.tts-bar:hover {
  background: rgba(37, 99, 235, 0.15);
  border-color: var(--primary);
}
.tts-bar.speaking {
  background: var(--gradient-primary);
  color: white;
  border-color: transparent;
  animation: ttsPulse 1.5s ease-in-out infinite;
}
.tts-bar .tts-btn { font-size: 14px; line-height: 1; }
.tts-bar .tts-label { font-size: 11px; }

@keyframes ttsPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.3); }
  50% { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }

.chat-msg {

/* 思考动画 */

/* ========== 我的Tab ========== */

/* 设置项 */

.settings-item {

.settings-item input[type="text"],

/* ========== 庆祝动画 ========== */

}

@keyframes confettiFall {

/* 祝贺弹窗 */

}

/* ========== 确认弹窗 ========== */

  top: 0; left: 0;

/* 滚动条美化 */

::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ========== 移动端适配（768px以下） ========== */
@media (max-width: 768px) {
  /* 隐藏侧边栏，显示底部Tab栏 */
  .sidebar { display: none; }
  .tab-bar {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: var(--tab-height);
    background: white;
    align-items: center;
    justify-content: space-around;
    border-top: 1px solid var(--border);
    z-index: 100;
    box-shadow: 0 -1px 4px rgba(0,0,0,0.04);
  }

  /* 主内容区域全宽 */
  .main-area {
    margin-left: 0;

  .content {
    padding: 0 12px;

  /* 标题栏 */
  .header { padding: 0 12px; font-size: 16px; }

  /* 欢迎区域 */
  .welcome-section { padding: 16px 12px; }
  .welcome-greeting { font-size: 16px; }
  .welcome-stats { gap: 8px; }
  .stat-circle { width: 56px; height: 56px; }
  .stat-circle svg { width: 56px; height: 56px; }
  .stat-circle .circle-text { font-size: 13px; }
  .streak-info { font-size: 20px; }

  /* 科目网格改为2列 */
  .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* 卡片内边距缩小 */

  /* 聊天输入框固定到底部 */
  .chat-input-area {
    position: fixed;
    bottom: var(--tab-height);
    left: 0;
    width: 100%;
    border-radius: 0;
  }

  /* 聊天区域高度调整 */
  .chat-area {
    max-height: calc(100vh - 280px);
  }

  /* 消息气泡宽度调整 */
  .chat-msg .msg-bubble { max-width: 80%; font-size: 13px; }

  /* 统计条标签宽度 */
  .stat-bar-label { width: 36px; font-size: 11px; }

  /* 试卷区域 */
  .exam-paper { margin: 8px 12px; padding: 12px; }
}

/* ========== 平板适配（769px-1024px） ========== */
@media (min-width: 769px) and (max-width: 1024px) {
  .main-area { margin-left: 200px; }
  .sidebar { width: 200px; }
  .content { max-width: 760px; padding: 0 16px; }
  .subject-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ========== 大屏优化（1200px+） ========== */
@media (min-width: 1200px) {
  .subject-grid { grid-template-columns: repeat(3, 1fr); }
  .content { max-width: 960px; }
  .welcome-stats { max-width: 500px; margin: 0 auto; }
}

/* ========== 打印支持 ========== */
@media print {
  .header, .sidebar, .tab-bar, .chat-input-area { display: none !important; }
  .main-area { margin-left: 0 !important; }
  .content { max-width: 100% !important; }
  body { background: white; }
  .app-container { box-shadow: none; }
  .tab-content { display: none !important; }
  .tab-content.active { display: block !important; }
  .exam-paper { box-shadow: none; margin: 0; padding: 0; }
}

  return html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
    .replace(/on\w+\s*=\s*['"][^'"]*['"]/gi, '')
    .replace(/on\w+\s*=\s*[^\s>]+/gi, '')
    .replace(/javascript\s*:/gi, '');
}

/* 获取科目分数（优先从 state 读取，兼容旧数据回退到 SUBJECTS 硬编码） */
function getScore(subjectId) {
  if (state.scores && state.scores[subjectId] !== undefined && state.scores[subjectId] !== null) return state.scores[subjectId];
  return null; // null = 未填写
}
function hasAnyScore() {
  return !!(state.scores && Object.values(state.scores).some(v => v !== undefined && v !== null));
}
function getTotalScore() {
  if (!hasAnyScore()) return null;
  return Object.values(state.scores).filter(v => v !== undefined && v !== null).reduce((a, b) => a + b, 0);
}

/* 获取星期几 */
function getDayOfWeek() {

}

/* 获取今日安排 */
function getTodaySchedule() {
  const day = new Date().getDay();
  // 周日休息日
  if (day === 0) return { label: '复盘日', detail: '不做新内容：翻翻本周错题、把薄弱科的补漏过一遍', subjectIds: [] };

  // 按分数升序排列（最弱优先），诊断标记的薄弱科额外提升优先级
  var sorted = getGradeSubjects().filter(function(s) {
    var sc = getScore(s.id);
    return sc !== null && sc > 0;
  }).sort(function(a, b) {
    var sa = getScore(a.id) || 999;
    var sb = getScore(b.id) || 999;
    // 诊断标记的薄弱科额外 -20（等效20分的优先级加成）
    var diagA = state.weakness && state.weakness[a.id] && state.weakness[a.id].fromDiagnosis ? 20 : 0;
    var diagB = state.weakness && state.weakness[b.id] && state.weakness[b.id].fromDiagnosis ? 20 : 0;
    var effectiveA = sa - diagA;
    var effectiveB = sb - diagB;
    if (effectiveA === effectiveB) return a.priority - b.priority;
    return effectiveA - effectiveB;
  });

  // 如果所有科目都没有分数，但诊断标记了薄弱科，用诊断结果
  if (sorted.length === 0 && state.weakness) {
    var diagSubjects = getGradeSubjects().filter(function(s) {
      return state.weakness[s.id] && state.weakness[s.id].fromDiagnosis;
    });
    if (diagSubjects.length > 0) sorted = diagSubjects;
  }

  // 如果仍然为空，回退到admin默认值
  if (sorted.length === 0) sorted = getGradeSubjects().filter(function(s) { return s.group === 'core'; });

  // 每天安排1-3科，按天轮换
  var idx = (day - 1) % sorted.length;
  var todaySubjects = [];
  // 周一1科，周二1科，周三2科，周四2科，周五2科，周六全部弱科
  if (day === 1 || day === 2) {
    todaySubjects = [sorted[idx].id];
  } else if (day <= 5) {
    todaySubjects = [sorted[idx].id, sorted[(idx + 1) % sorted.length].id];
  } else {
    // 周六：所有薄弱科（分数<60的）
    var weaks = sorted.filter(function(s) { return (getScore(s.id) || 0) < 60; });
    todaySubjects = weaks.length > 0 ? weaks.map(function(s) { return s.id; }) : [sorted[0].id, sorted[1].id];
  }

  var names = todaySubjects.map(function(id) {
    var s = getGradeSubjects().find(function(sub) { return sub.id === id; });
    return s ? s.name : id;
  });
  return { label: '自修日', detail: names.join('、') + '（AI讲课+练习）', subjectIds: todaySubjects };
}

/* 计算科目完成进度 */
function getSubjectProgress(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return { completed: 0, total: 8, percent: 0 };
  let completed = 0;
  subject.topics.forEach((_, i) => {
    if (state.progress[`${subjectId}_${i}`]) completed++;
  });
  return { completed, total: 8, percent: Math.round((completed / 8) * 100) };
}

/* 获取总完成专题数 */
function getTotalCompleted() {
  let count = 0;
  SUBJECTS.forEach(s => {
    count += getSubjectProgress(s.id).completed;
  });
  return count;
}

/* 获取连续学习天数 */
function getStreakDays() {
  if (!state.studyDays || state.studyDays.length === 0) return 0;
  const sorted = [...state.studyDays].sort().reverse();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

  if (!sorted.includes(today) && !sorted.includes(yesterday)) return 0;

  let streak = 0;
  let checkDate = new Date(sorted[0]);
  for (let i = 0; i < sorted.length; i++) {
    const expected = new Date(checkDate).toISOString().split('T')[0];
    if (sorted[i] === expected) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else if (sorted[i] < expected) {
      break;
    }
  }
  return streak;
}

/* 记录今天学习了 */

  }
}

/* 简单Markdown渲染 */
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:var(--primary-softer);padding:2px 4px;border-radius:4px;font-size:12px;">$1</code>')
    .replace(/\n/g, '<br>');
}

/* 获取已完成和未完成专题 */
function getCompletedTopics(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return { completed: [], remaining: [] };
  const completed = [];
  const remaining = [];
  subject.topics.forEach((topic, i) => {
    if (state.progress[`${subjectId}_${i}`]) {
      completed.push(topic);
    } else {
      remaining.push(topic);
    }
  });
  return { completed, remaining };
}

/* 应用诊断结果到学习计划 */
function applyDiagnosisToPlan() {
  if (!state.diagnosisResult) return;
  
  // 从诊断文本中提取提到的科目，自动标记为薄弱
  var text = state.diagnosisResult.replace(/<[^>]+>/g, '').toLowerCase();
  var weakSubjects = [];
  
  // 科目关键词检测
  var subjectKeywords = {
    math: ['数学', '函数', '向量', '数列', '三角', '不等式', '几何', '代数'],
    chinese: ['语文', '文言文', '古诗', '阅读', '作文', '默写'],
    english: ['英语', '英语', '时态', '语态', '从句', '词汇', '阅读'],
    physics: ['物理', '力学', '牛顿', '运动', '曲线', '万有引力', '功'],
    chemistry: ['化学', '离子', '氧化还原', '方程式', '物质的量', '周期律'],
    biology: ['生物', '细胞', '基因', '遗传', '分子'],
    history: ['历史', '朝代', '先秦', '秦汉', '隋唐', '近代史'],
    politics: ['政治', '经济', '哲学', '民主', '政府', '分配'],
    geography: ['地理', '地图', '气候', '地貌', '环流', '经纬']
  };
  
  Object.keys(subjectKeywords).forEach(function(sid) {
    var matched = subjectKeywords[sid].some(function(kw) { return text.indexOf(kw.toLowerCase()) !== -1; });
    if (matched) weakSubjects.push(sid);
  });
  
  if (weakSubjects.length === 0) {
    showToast('未从诊断结果中识别出薄弱科目，请手动调整', 'warning');
    return;
  }
  
  if (!state.weakness) state.weakness = {};
  
  // 标记为薄弱（level=weak），并记录来源为诊断
  weakSubjects.forEach(function(sid) {
    var sc = getScore(sid);
    var level = sc !== null && sc < 60 ? 'severe' : 'weak';
    state.weakness[sid] = { level: level, score: sc || 0, updatedAt: Date.now(), fromDiagnosis: true };
  });
  
  state.diagnosisApplied = true;
  saveState();
  showToast('✅ 已识别 ' + weakSubjects.length + ' 个薄弱科目，已更新学习计划', 'success');
  render();
}

/* 获取进度最落后的科目（P0-3，用于"下一步建议"） */
function getWeakestSubject() {
  // 成绩优先：有分数记录时，优先补分数最低的科目（缺啥补啥）
  const scored = getGradeSubjects().filter(s => { const v = getScore(s.id); return v !== null && v > 0; });
  if (scored.length > 0) {
    let weakest = scored[0];
    scored.forEach(s => {
      const diff = getScore(s.id) - getScore(weakest.id);
      if (diff < 0 || (diff === 0 && s.priority < weakest.priority)) weakest = s;
    });
    weakest._weakByScore = true;
    return weakest;
  }
  // 无分数时按学习进度，同进度则按priority
  let weakest = null;
  let lowest = 101;
  SUBJECTS.forEach(s => {
    const p = getSubjectProgress(s.id);
    if (p.percent < lowest || (p.percent === lowest && s.priority < (weakest ? weakest.priority : 999))) {
      lowest = p.percent;
      weakest = s;
    }
  });
  return weakest;
}

/* 根据成绩计算薄弱分析 */
function calcWeakness() {
  if (!state.weakness) state.weakness = {};
  getGradeSubjects().forEach(s => {
    const sc = getScore(s.id);
    if (sc === null) return;
    // 分数 → 薄弱等级：<50分=严重薄弱, <70=薄弱, <85=一般, >=85=良好
    const level = sc < 50 ? 'severe' : (sc < 70 ? 'weak' : (sc < 85 ? 'normal' : 'good'));
    state.weakness[s.id] = { level, score: sc, updatedAt: Date.now() };
  });
  saveState();
  render();
}

/* ========== 基础补漏 ========== */
function renderFoundationCard(subject) {
  const items = FOUNDATION[subject.id];
  if (!items) return '';
  if (!state.foundation) state.foundation = {};
  const done = items.filter((_, i) => state.foundation[subject.id + '_f' + i]).length;
  const sc = getScore(subject.id);
  const lowScore = sc !== null && sc < 60;
  const banner = lowScore
    ? `<div style="font-size:12px;color:#b45309;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 10px;margin-bottom:10px;">⚠️ 这科目前 <b>${sc}分</b>，直接学衔接专题会听不懂——<b>强烈建议先把下面的基础补漏过完</b>，再回来学专题。</div>`
    : (sc === null ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">地基不牢，地动山摇。先把基础补漏过完，再学衔接专题会轻松很多。</div>` : '');
  const rows = items.map((it, i) => {
    const checked = state.foundation[subject.id + '_f' + i] ? 'checked' : '';
    const completedClass = checked ? 'completed-text' : '';
    return `
      <div class="topic-list-item">
        <div class="topic-checkbox ${checked}" onclick="event.stopPropagation();toggleFoundation('${subject.id}', ${i})">${checked ? '&#10003;' : ''}</div>
        <div class="topic-info">
          <div class="t-num">补漏 ${i + 1}</div>
          <div class="t-name ${completedClass}">${it[0]}</div>
          <div style="font-size:11px;color:var(--text-light);margin-top:2px;">${it[1]}</div>
        </div>
        <div class="topic-actions">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();startFoundationLesson('${subject.id}', ${i})">补漏</button>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="card" style="margin-top:0;border-left:4px solid #f59e0b;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:14px;font-weight:600;">🧱 基础补漏（${done}/${items.length}）</span>
        <span style="font-size:11px;color:var(--text-light);">先补地基，再盖高楼</span>
      </div>
      ${banner}
      ${rows}
    </div>`;
}

function toggleFoundation(subjectId, idx) {
  if (!state.foundation) state.foundation = {};
  const key = subjectId + '_f' + idx;
  state.foundation[key] = !state.foundation[key];
  saveState();
  renderSubjects();
}

function startFoundationLesson(subjectId, idx) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  const item = (FOUNDATION[subjectId] || [])[idx];
  if (!subject || !item) return;
  state.currentTab = 'chat';
  state.currentTeacher = subjectId;
  saveState();
  render();
  setTimeout(() => {
    const input = document.getElementById('chatInput');
    if (!input) return;
    input.value = `老师，我基础比较差，想从头补「${item[0]}」（${item[1]}）。请当我完全零基础，用最通俗的方式从头讲起，多举生活中的例子，讲完带我练一道最基础的题。`;
    sendMessage();
  }, 400);
}

      </div>
      ${renderFoundationCard(subject)}

          <span style="font-size:14px;font-weight:600;">学习专题 (${p.completed}/8)</span>
          <span style="font-size:13px;color:${subject.color};font-weight:600;">${p.percent}%</span>

function toggleExamSubject(subjectId, el) {
  const idx = state.examSettings.subjects.indexOf(subjectId);
  if (idx > -1) {
    state.examSettings.subjects.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.examSettings.subjects.push(subjectId);
    el.classList.add('selected');
  }
  saveState();
  getExamRangeHtml();
  document.getElementById('examRange').innerHTML = getExamRangeHtml();
}

function toggleExamType(typeName, el) {
  const idx = state.examSettings.types.indexOf(typeName);
  if (idx > -1) {
    state.examSettings.types.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.examSettings.types.push(typeName);
    el.classList.add('selected');
  }
  saveState();
}

function setExamCount(count, el) {
  state.examSettings.questionCount = count;
  saveState();
  el.parentElement.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
}

function setExamDifficulty(diff, el) {
  state.examSettings.difficulty = diff;
  saveState();
  el.parentElement.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
}

function getExamRangeHtml() {
  const subjects = state.examSettings.subjects;
  if (subjects.length === 0) {
    return '<span style="color:var(--text-light);">请先选择考试科目</span>';
  }
  let html = '';
  subjects.forEach(sid => {
    const subject = SUBJECTS.find(s => s.id === sid);
    const { completed } = getCompletedTopics(sid);
    html += `<div style="margin-bottom:4px;">${subject.icon} ${subject.name}：${completed.length > 0 ? completed.join('、') : '<span style="color:var(--text-light);">暂无已完成专题</span>'}</div>`;
  });
  return html;
}

/* ========== 开始出卷（科目一答题卡模式） ========== */
async function startExam() {
  const cfg = getConfig();
  if (!cfg.apiKey) {
    showConfirm('未配置AI接口', '请先在「我的」页面配置AI接口后再出卷。是否前往配置？', () => {
      switchTab('me');
    });
    return;
  }
  if (state.examSettings.subjects.length === 0) {
    showToast('请至少选择一个考试科目', 'warning');
    return;
  }
  if (state.examSettings.types.length === 0) {
    showToast('请至少选择一种题型', 'warning');
    return;
  }

  const subjectsInfo = state.examSettings.subjects.map(sid => {
    const s = SUBJECTS.find(sub => sub.id === sid);
    const { completed } = getCompletedTopics(sid);
    return `${s.name}：${completed.join('、') || '全部专题'}`;
  });

  // 出卷难度：按科目各自的分数单独调整（<60 分的科用基础题，其余保持所选难度）
  var diffLines = state.examSettings.subjects.map(function (sid) {
    var sub = SUBJECTS.find(s => s.id === sid);
    var sc = getScore(sid);
    var d = (sc !== null && sc < 60) ? '基础' : state.examSettings.difficulty;
    return sub.name + '=' + d + (sc !== null ? '（当前' + sc + '分）' : '');
  });

  const prompt = `请出一份高考模拟练习卷，要求如下：
科目：${state.examSettings.subjects.map(sid => SUBJECTS.find(s => s.id === sid).name).join('、')}
考试范围：${subjectsInfo.join('；')}
题目数量：${state.examSettings.questionCount}题
难度（按科目分别执行）：${diffLines.join('；')}
题型：${state.examSettings.types.join('、')}（选择题=choice，填空题=fill，解答题=essay）
要求：严格限定在范围内；难度由易到难；紧扣高考考点；每题给出答案和简洁解析。按JSON格式输出。`;

  openQuizLoading('AI 老师正在为你出卷...', [
    '正在挑选适合你当前进度的题目...',
    '正在调整难度梯度，由易到难...',
    '正在核对高考考点覆盖率...',
    '快好了，老师在做最后的检查...'
  ]);
  try {
    const quiz = await generateQuiz(prompt);
    closeQuizLoading();
    openQuizSession(quiz, { kind: 'exam', label: '智能组卷' });
  } catch (error) {
    closeQuizLoading();
    const el = document.getElementById('tab-exam');
    el.innerHTML = `
      <div class="card soft-error">
        <div class="soft-error-emoji">🍵</div>
        <div class="soft-error-title">出卷老师打了个盹</div>
        <div class="soft-error-text">试卷没有生成成功，可能是网络波动。喝口水，我们再来一次～</div>
        <div class="soft-error-detail">${error.message || '未知错误'}</div>
        <button class="btn btn-primary" onclick="renderExam()">再试一次</button>
      </div>
    `;
  }
}

/* ========== AI 出题（JSON 模式） ========== */
async function generateQuiz(promptText) {
  const cfg = getConfig();
  const sys = '你是资深高考命题与辅导专家。严格只输出一个JSON对象（不要markdown代码块、不要任何解释文字）。JSON结构：'
    + '{"title":"标题","questions":['
    + '{"type":"choice","q":"题干","options":["A. 选项","B. 选项","C. 选项","D. 选项"],"answer":"A","analysis":"解析"},'
    + '{"type":"fill","q":"填空题干____","answer":"标准答案","analysis":"解析"},'
    + '{"type":"essay","q":"解答题干","answer":"参考答案要点","analysis":"解题思路"}]}。'
    + 'type只能是choice/fill/essay；choice必须有4个options且answer是正确选项字母（A/B/C/D）。';
  const res = await fetch(cfg.apiEndpoint || 'https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
    body: JSON.stringify({
      model: cfg.model || 'deepseek-chat',
      messages: [
        { role: 'system', content: sys },
        { role: 'user', content: promptText }
      ],
      response_format: { type: 'json_object' }
    })
  });
  if (!res.ok) throw new Error(`API调用失败：${res.status}`);
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content || '';
  return parseQuizJSON(text);
}

function parseQuizJSON(text) {
  let t = String(text).trim().replace(/^```(?:json)?/i, '').replace(/```\s*$/, '').trim();
  const a = t.indexOf('{'), b = t.lastIndexOf('}');
  if (a >= 0 && b > a) t = t.slice(a, b + 1);
  const obj = JSON.parse(t);
  if (!obj || !Array.isArray(obj.questions) || !obj.questions.length) throw new Error('题目格式异常');
  obj.questions = obj.questions.map(q => ({
    type: (q.type === 'fill' || q.type === 'essay') ? q.type : 'choice',
    q: String(q.q || '').trim(),
    options: Array.isArray(q.options) ? q.options.slice(0, 6).map(x => String(x)) : [],
    answer: String(q.answer == null ? '' : q.answer).trim(),
    analysis: String(q.analysis || '').trim()
  })).filter(q => q.q);
  if (!obj.questions.length) throw new Error('题目为空');
  obj.title = String(obj.title || '智能练习');
  return obj;
}

/* ========== 答题卡（科目一模式：做完提交再出答案） ========== */
let quizTipsTimer = null;

function openQuizLoading(title, tips) {
  closeQuizLoading();
  const mask = document.createElement('div');
  mask.id = 'quizLoadingMask';
  mask.className = 'quiz-mask';
  mask.innerHTML = `
    <div class="quiz-loading-card">
      <div style="font-size:44px;margin-bottom:10px;">📝</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:10px;">${title}</div>
      <div class="loading-dots" style="justify-content:center;"><span></span><span></span><span></span></div>
      <div id="quizLoadingTip" style="font-size:12px;color:var(--text-secondary);margin-top:12px;min-height:18px;">${tips[0]}</div>
    </div>`;
  document.body.appendChild(mask);
  let i = 0;
  quizTipsTimer = setInterval(() => {
    i = (i + 1) % tips.length;
    const tipEl = document.getElementById('quizLoadingTip');
    if (tipEl) tipEl.textContent = tips[i];
  }, 2600);
}

function closeQuizLoading() {
  if (quizTipsTimer) { clearInterval(quizTipsTimer); quizTipsTimer = null; }
  const m = document.getElementById('quizLoadingMask');
  if (m) m.remove();
}

function openQuizSession(quiz, meta) {
  state.quiz = {
    title: quiz.title, questions: quiz.questions,
    answers: {}, submitted: false, score: null,
    meta: meta || { kind: 'exam', label: '智能组卷' }, ts: Date.now()
  };
  saveState();
  renderQuizOverlay();
}

function closeQuizSession() {
  const m = document.getElementById('quizOverlay');
  if (m) m.remove();
  if (state.currentTab === 'exam') renderExam();
}

function renderQuizOverlay() {
  const qz = state.quiz;
  if (!qz) return;
  const old = document.getElementById('quizOverlay');
  if (old) old.remove();

  const total = qz.questions.length;
  const answered = Object.keys(qz.answers).length;
  const gradable = qz.questions.filter(q => q.type !== 'essay').length;

  const qsHtml = qz.questions.map((q, i) => {
    const userAns = qz.answers[i];
    let bodyHtml = '';
    if (q.type === 'choice') {
      bodyHtml = q.options.map((op, oi) => {
        const letter = String.fromCharCode(65 + oi);
        let cls = 'quiz-opt';
        if (userAns === letter) cls += ' sel';
        if (qz.submitted) {
          const right = quizRightLetter(q);
          if (letter === right) cls += ' correct';
          else if (userAns === letter) cls += ' wrong';
        }
        return `<div class="${cls}" onclick="quizChoose(${i}, '${letter}')">${escapeHtml(op)}</div>`;
      }).join('');
    } else if (q.type === 'fill') {
      let cls = 'quiz-fill';
      let verdict = '';
      if (qz.submitted) {
        const ok = quizFillCorrect(q, userAns);
        cls += ok ? ' correct' : ' wrong';
        verdict = ok ? '✓' : '✗';
      }
      bodyHtml = `<input class="${cls}" id="quizFill_${i}" placeholder="写下你的答案" value="${userAns ? escapeHtml(userAns) : ''}"
        ${qz.submitted ? 'disabled' : ''} oninput="quizFill(${i}, this.value)" />`;
    } else {
      bodyHtml = `<textarea class="quiz-fill" rows="3" placeholder="写下你的解题要点，提交后对照参考答案" id="quizFill_${i}"
        ${qz.submitted ? 'disabled' : ''} oninput="quizFill(${i}, this.value)">${userAns ? escapeHtml(userAns) : ''}</textarea>`;
    }
    let analysisHtml = '';
    if (qz.submitted) {
      const tag = q.type === 'essay' ? '参考答案' : '答案';
      const okMark = q.type === 'essay' ? '📖' : (q.type === 'choice'
        ? (userAns === quizRightLetter(q) ? '<span class="ok">✓ 答对了</span>' : '<span class="no">✗ 正确答案 ' + quizRightLetter(q) + '</span>')
        : (quizFillCorrect(q, userAns) ? '<span class="ok">✓ 答对了</span>' : '<span class="no">✗ 参考答案：' + escapeHtml(q.answer) + '</span>'));
      analysisHtml = `<div class="quiz-analysis">
        <div class="quiz-analysis-row">${okMark}</div>
        ${q.type !== 'choice' && q.type !== 'fill' ? `<div class="quiz-analysis-row"><b>${tag}：</b>${escapeHtml(q.answer)}</div>` : ''}
        ${q.analysis ? `<div class="quiz-analysis-row"><b>解析：</b>${escapeHtml(q.analysis)}</div>` : ''}
      </div>`;
    }
    const typeName = q.type === 'choice' ? '选择' : (q.type === 'fill' ? '填空' : '解答');
    return `<div class="quiz-q" id="quizQ_${i}">
      <div class="quiz-q-title"><span class="quiz-q-no">${i + 1}</span><span class="quiz-q-type">${typeName}</span>${escapeHtml(q.q)}</div>
      ${bodyHtml}
      ${analysisHtml}
    </div>`;
  }).join('');

  const footHtml = qz.submitted
    ? `<div class="quiz-score-bar">
         <div class="quiz-score-num">${qz.score}<span>分</span></div>
         <div class="quiz-score-text">答对 ${qz._rightCount}/${gradable} 题（解答题不计分，对照答案自查）</div>
         <button class="btn btn-primary" onclick="quizRetry()">🔄 再练一组</button>
         <button class="btn btn-outline" onclick="closeQuizSession()">完成，返回</button>
       </div>`
    : `<div class="quiz-submit-bar">
         <span style="font-size:12px;color:var(--text-secondary);">已答 ${answered}/${total} 题，做完再交卷哦</span>
         <button class="btn btn-primary btn-block" onclick="quizSubmit()">交卷，查看答案解析</button>
       </div>`;

  const mask = document.createElement('div');
  mask.id = 'quizOverlay';
  mask.className = 'quiz-mask';
  mask.innerHTML = `
    <div class="quiz-panel">
      <div class="quiz-head">
        <div class="quiz-head-info">
          <div class="quiz-head-title">${escapeHtml(qz.title)}</div>
          <div class="quiz-head-sub">${escapeHtml(qz.meta.label)} · ${total} 题 · 做完交卷出答案</div>
        </div>
        <button class="quiz-close" onclick="closeQuizSession()">✕</button>
      </div>
      <div class="quiz-body">${qsHtml}</div>
      ${footHtml}
    </div>`;
  document.body.appendChild(mask);
}

function quizChoose(qi, letter) {
  const qz = state.quiz;
  if (!qz || qz.submitted) return;
  qz.answers[qi] = letter;
  saveState();
  renderQuizOverlay();
  // 保持滚动位置
  const el = document.getElementById('quizQ_' + qi);
  if (el) el.scrollIntoView({ block: 'nearest' });
}

function quizFill(qi, val) {
  const qz = state.quiz;
  if (!qz || qz.submitted) return;
  if (val && val.trim()) qz.answers[qi] = val.trim();
  else delete qz.answers[qi];
  saveState();
}

function quizRightLetter(q) {
  const m = String(q.answer || '').trim().toUpperCase().match(/[A-F]/);
  return m ? m[0] : 'A';
}

function quizFillCorrect(q, userAns) {
  if (!userAns) return false;
  const norm = s => String(s).toLowerCase().replace(/[\s。．.,，、;；:：'’"“”()（）]/g, '');
  const u = norm(userAns), a = norm(q.answer);
  if (!a) return false;
  return u === a || (a.length >= 2 && u.indexOf(a) >= 0) || (u.length >= 2 && a.indexOf(u) >= 0);
}

function quizSubmit() {
  const qz = state.quiz;
  if (!qz || qz.submitted) return;
  const total = qz.questions.length;
  const answered = Object.keys(qz.answers).length;
  if (answered < total && !confirm(`还有 ${total - answered} 题没答，确定交卷吗？`)) return;
  let right = 0, gradable = 0;
  qz.questions.forEach((q, i) => {
    if (q.type === 'essay') return;
    gradable++;
    const ans = qz.answers[i];
    if (q.type === 'choice' && ans === quizRightLetter(q)) right++;
    if (q.type === 'fill' && quizFillCorrect(q, ans)) right++;
  });
  qz._rightCount = right;
  qz.score = gradable ? Math.round(right / gradable * 100) : 0;
  qz.submitted = true;
  saveState();
  renderQuizOverlay();
}

async function quizRetry() {
  const qz = state.quiz;
  if (!qz) return;
  state.quiz = null;
  saveState();
  closeQuizSession();
  if (qz.meta.kind === 'practice') {
    // 练习模式：沿用上次范围重新生成
    if (qz.meta.subjectId !== undefined) startPracticeQuiz(qz.meta.subjectId, qz.meta.topicIndex);
  } else {
    startExam();
  }
}

/* 处理试卷上传 */
function handlePaperUpload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;

  if (!state.diagnosisImages) state.diagnosisImages = [];

  const remainingFiles = files.length;
  let loaded = 0;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      state.diagnosisImages.push(e.target.result);
      loaded++;
      if (loaded === remainingFiles) {
        saveState();
        renderDiagnosis();
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

    }))

    _diagAbortController = new AbortController();

    const response = await fetch(cfg.apiEndpoint || 'https://api.deepseek.com/v1/chat/completions', {

      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.apiKey}`

        model: cfg.model || 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        stream: true
      }),

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '' || trimmed === 'data: [DONE]') continue;
        if (trimmed.startsWith('data: ')) {
          try {
            const data = JSON.parse(trimmed.slice(6));

          }
        }
      }
    }

    // 移除加载动画
    const loadEl = document.getElementById('diagnosisLoading');
    if (loadEl) loadEl.remove();

    // 保存结果
    state.diagnosisResult = content;
    // 保存到历史记录
    if (!state.diagnosisHistory) state.diagnosisHistory = [];
    const today = new Date();
    const dateStr = `${today.getMonth()+1}月${today.getDate()}日`;
    state.diagnosisHistory.unshift({
      date: dateStr,
      content: content,
      images: state.diagnosisImages.slice(0, 2),
      summary: content.substring(0, 100).replace(/<[^>]+>/g, '') + '...'
    });
    saveState();
    renderDiagnosis();

  } catch (error) {
    el.innerHTML = `

        <button class="btn btn-primary" onclick="renderDiagnosis()">重新上传</button>
      </div>
    `;
  }
}

        if (!input || (state.chatHistory[state.currentTeacher] || []).length > 0) { window.__kickoffBusy = false; return; }
        input.value = '老师好，我来了，我们开始上课吧。';
        sendMessage().finally(function () { window.__kickoffBusy = false; });
      } catch (e) { window.__kickoffBusy = false; }
    }, 600);
  }

  // 自适应输入框高度
  const textarea = document.getElementById('chatInput');
  if (textarea) {
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    });
  }
}

function handleChatKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
}

/* ========== 发送消息 ========== */
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  const subjectId = state.currentTeacher;

  // 保存用户消息
  if (!state.chatHistory[subjectId]) state.chatHistory[subjectId] = [];
  state.chatHistory[subjectId].push({ role: 'user', content: message, timestamp: Date.now() });
  saveState();

  input.value = '';
  input.style.height = 'auto';

  // 添加用户消息到UI
  const chatArea = document.getElementById('chatArea');
  const userMsgHtml = `
    <div class="chat-msg user">
      <div class="msg-avatar">&#128100;</div>
      <div class="msg-bubble">${escapeHtml(message)}</div>
    </div>`;
  chatArea.insertAdjacentHTML('beforeend', userMsgHtml);

  // 显示思考中
  const teacher = SUBJECTS.find(s => s.id === subjectId);
  const thinkingHtml = `
    <div class="chat-msg assistant" id="thinkingMsg">
      <div class="msg-avatar">${teacher.teacher.avatar}</div>
      <div class="msg-bubble">
        <div class="thinking-indicator">
          <div class="dots"><span></span><span></span><span></span></div>
          <span style="font-size:12px;color:var(--text-light);">正在思考...</span>
        </div>
      </div>
    </div>`;
  chatArea.insertAdjacentHTML('beforeend', thinkingHtml);
  chatArea.scrollTop = chatArea.scrollHeight;

  const cfg = getConfig();

  if (!cfg.apiKey) {
    // 离线模式
    await new Promise(resolve => setTimeout(resolve, 1000));
    const reply = getOfflineResponse(subjectId);
    state.chatHistory[subjectId].push({ role: 'assistant', content: reply, timestamp: Date.now() });
    saveState();
    document.getElementById('thinkingMsg').remove();
    const replyId = `msg_offline_${Date.now()}`;
    const assistantMsgHtml = `
      <div class="chat-msg assistant">
        <div class="msg-avatar">${teacher.teacher.avatar}</div>
        <div class="msg-bubble" id="${replyId}">${renderMarkdown(reply)}
          <div class="tts-bar" onclick="speakMessage('${replyId}', this)">
            <span class="tts-btn">&#128264;</span> <span class="tts-label">朗读</span>
          </div>
        </div>
      </div>`;
    chatArea.insertAdjacentHTML('beforeend', assistantMsgHtml);
    chatArea.scrollTop = chatArea.scrollHeight;
    if (window.autoSpeakReply) window.autoSpeakReply(reply);
    return;
  }

  // 调用AI API
  try {
    // 取消上一次请求
    if (_chatAbortController) _chatAbortController.abort();
    _chatAbortController = new AbortController();

    const systemPrompt = getSystemPrompt(subjectId);
    const messages = state.chatHistory[subjectId].map(m => ({
      role: m.role,
      content: m.content
    }));

    const response = await fetch(cfg.apiEndpoint || 'https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.apiKey}`
      },
      body: JSON.stringify({
        model: cfg.model || 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          ...messages
        ],
        stream: true
      }),
      signal: _chatAbortController.signal
    });

    if (!response.ok) {
      throw new Error(`API调用失败（${response.status}）`);
    }

    // 替换思考消息为streaming消息
    const thinkingEl = document.getElementById('thinkingMsg');
    if (thinkingEl) {
      thinkingEl.querySelector('.msg-bubble').innerHTML = '';
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let content = '';
    let buffer = '';
    let ttsBuf = '';   // 流式跟读缓冲：凑够一句就立即朗读

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '' || trimmed === 'data: [DONE]') continue;
        if (trimmed.startsWith('data: ')) {
          try {
            const data = JSON.parse(trimmed.slice(6));
            const delta = data.choices?.[0]?.delta?.content || '';
            content += delta;
            // 流式跟读：遇到句末标点/换行就把完整句子送入朗读队列
            if (window.autoSpeakEnqueue && delta) {
              ttsBuf += delta;
              let m;
              while ((m = ttsBuf.match(/^([\s\S]{2,}?[。！？；!?:;\n])([\s\S]*)$/)) !== null) {
                window.autoSpeakEnqueue(m[1]);
                ttsBuf = m[2];
              }
            }
            const bubbleEl = thinkingEl?.querySelector('.msg-bubble');
            if (bubbleEl) {
              bubbleEl.innerHTML = renderMarkdown(content);
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch (e) {
            // 跳过
          }
        }
      }
    }
    // 流结束：收尾剩余的半句
    if (window.autoSpeakEnqueue && ttsBuf.trim()) window.autoSpeakEnqueue(ttsBuf);
    ttsBuf = '';

    // 保存完整回复
    content = (typeof window.cleanStageText === 'function') ? window.cleanStageText(content) : content;
    state.chatHistory[subjectId].push({ role: 'assistant', content: content, timestamp: Date.now() });
    saveState();

    // 添加朗读按钮到streaming消息
    const streamReplyId = `msg_stream_${Date.now()}`;
    if (thinkingEl) {
      thinkingEl.id = '';
      thinkingEl.querySelector('.msg-bubble').id = streamReplyId;
      thinkingEl.querySelector('.msg-bubble').innerHTML += `
        <div class="tts-bar" onclick="speakMessage('${streamReplyId}', this)">
          <span class="tts-btn">&#128264;</span> <span class="tts-label">朗读</span>
        </div>`;
    }
    // 流式跟读已在接收过程中逐句播报，无需整段重读

  } catch (error) {
    const thinkingEl = document.getElementById('thinkingMsg');
    if (thinkingEl) {
      thinkingEl.remove();
    }
    const errMsg = `
      <div class="chat-msg assistant">
        <div class="msg-avatar">${teacher.teacher.avatar}</div>
        <div class="msg-bubble" style="color:var(--text);background:var(--primary-soft);border:1px solid var(--border);">😅 老师这里信号不太好，刚才的问题没收到。检查下网络和接口配置，再问我一遍好不好？<br><span style="font-size:11px;color:var(--text-light);">${error.message || ''}</span></div>
      </div>`;
    chatArea.insertAdjacentHTML('beforeend', errMsg);
    // 移除最后一条失败的assistant消息（不保存）
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

/* ========== 语音朗读功能 ========== */
let currentUtterance = null;
let currentTTSBtn = null;

function speakMessage(msgId, btnEl) {
  // 如果正在朗读，先停止
  if (currentUtterance) {
    speechSynthesis.cancel();
    if (currentTTSBtn) {
      currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
      currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
      currentTTSBtn.classList.remove('speaking');
    }
    // 如果点击的是当前正在朗读的消息，则停止
    if (currentTTSBtn === btnEl) {
      currentUtterance = null;
      currentTTSBtn = null;
      return;
    }
  }

  const msgEl = document.getElementById(msgId);
  if (!msgEl) return;

  // 提取纯文本（去除HTML标签和TTS按钮文本）
  const clone = msgEl.cloneNode(true);
  const ttsBar = clone.querySelector('.tts-bar');
  if (ttsBar) ttsBar.remove();
  const text = clone.textContent || clone.innerText || '';

  if (!text.trim()) return;

  // 创建语音合成
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;

  // 尝试选择中文语音
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  // 更新按钮状态
  btnEl.querySelector('.tts-label').textContent = '停止';
  btnEl.querySelector('.tts-btn').innerHTML = '&#128263;';
  btnEl.classList.add('speaking');

  currentUtterance = utterance;
  currentTTSBtn = btnEl;

  utterance.onend = () => {
    btnEl.querySelector('.tts-label').textContent = '朗读';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
    btnEl.classList.remove('speaking');
    currentUtterance = null;
    currentTTSBtn = null;
  };

  utterance.onerror = () => {
    btnEl.querySelector('.tts-label').textContent = '朗读';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
    btnEl.classList.remove('speaking');
    currentUtterance = null;
    currentTTSBtn = null;
  };

  speechSynthesis.speak(utterance);
}

/* 更新分数 */
function adminApi(method, body) {
  return fetch('/api/admin/users', {
    method: method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
    body: body ? JSON.stringify(body) : undefined
  }).then(function (r) {
    if (r.status === 401) { authExpired(); throw new Error('auth'); }
    return r.json();
  });
}

function adminCreateUser() {
  var name = document.getElementById('admName').value.trim();
  var grade = document.getElementById('admGrade').value;
  var user = document.getElementById('admUser').value.trim();
  var pass = document.getElementById('admPass').value;
  if (!name || !user || !pass) { showToast('姓名、用户名、密码都要填', 'warning'); return; }
  adminApi('POST', { user: user, pass: pass, name: name, grade: grade }).then(function (d) {
    if (d && d.ok) {
      showToast('已开通：' + user + '（' + name + '）', 'success');
      document.getElementById('admUser').value = '';
      document.getElementById('admPass').value = '';
      document.getElementById('admName').value = '';
      adminListUsers();
    } else {
      showToast('开通失败：' + ((d && d.error) || '未知错误'), 'error');
    }
  }).catch(function (e) { if (e.message !== 'auth') showToast('网络异常', 'error'); });
}

function adminListUsers() {
  var box = document.getElementById('userList');
  if (!box) return;
  box.textContent = '加载中…';
  adminApi('GET').then(function (d) {
    if (!d || !d.ok) { box.textContent = '加载失败：' + ((d && d.error) || ''); return; }
    if (!d.users.length) { box.textContent = '还没有开通任何账号'; return; }
    box.innerHTML = d.users.map(function (u) {
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px dashed #e2e8f0;gap:6px;">' +
        '<div style="min-width:0;">' +
          '<div style="font-weight:700;font-size:14px;">' + u.name + '<span style="font-weight:400;color:#64748b;font-size:12px;margin-left:6px;">' + u.grade + '</span></div>' +

        '</div>' +
        '<div style="display:flex;gap:6px;flex-shrink:0;">' +
          '<button class="btn btn-outline btn-sm" data-u="' + u.user + '" onclick="adminResetPass(this)">重置密码</button>' +

  adminApi('PUT', { user: u, pass: np }).then(function (d) {

      method: 'POST',

        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.apiKey}`
      },
      body: JSON.stringify({
        model: cfg.model || 'deepseek-chat',
        messages: [{ role: 'user', content: '你好' }],
        max_tokens: 10
      })
    });

    if (response.ok) {
      alert('连接成功！AI接口配置正确。');
    } else {
      const data = await response.json().catch(() => ({}));
      alert(`连接失败（${response.status}）：${data.error?.message || response.statusText}`);
    }
  } catch (error) {
    alert(`连接失败：${error.message}`);
  }
}

/* ========== 数据管理 ========== */
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `学习数据_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      state = { ...DEFAULT_STATE, ...data };
      state.config = { ...DEFAULT_STATE.config, ...(data.config || {}) };
      state.examSettings = { ...DEFAULT_STATE.examSettings, ...(data.examSettings || {}) };
      saveState();
      render();

}

(function () {

      setTimeout(() => toast.remove(), 400);
