<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新高二暑假智能学习系统</title>
<style>
/* ========== CSS 变量 ========== */
:root {
  --primary: #2563eb;
  --primary-light: #93c5fd;
  --primary-dark: #1e40af;
  --primary-soft: #eef3fb;
  --primary-softer: #f7f9fc;
  --accent: #0d9488;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --gradient-primary: #2563eb;
  --gradient-header: #1e3a8a;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(15,23,42,0.05);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.08);
  --tab-height: 56px;
  --header-height: 48px;
  --font: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
}

/* ========== 基础样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* 应用容器 - 网页版布局 */
.app-container {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

/* ========== 顶部标题栏 ========== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--header-height);
  background: var(--gradient-header);
  color: white;
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  font-size: 17px;
  font-weight: 600;
}

.header .back-btn {
  display: none;
  margin-right: 8px;
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.header .back-btn.show { display: flex; }

/* ========== 侧边导航栏（桌面端） ========== */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100vh;
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding-top: var(--header-height);
  z-index: 99;
  box-shadow: 1px 0 8px rgba(0,0,0,0.03);
}

.sidebar-logo {
  padding: 16px 20px 12px;
  font-size: 14px;
  font-weight: 700;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  border-bottom: 1px solid var(--border);
}

.sidebar-nav {
  flex: 1;
  padding: 8px;
  overflow-y: auto;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}

.sidebar-item:hover {
  background: var(--primary-soft);
  color: var(--primary-dark);
}

.sidebar-item.active {
  background: var(--gradient-primary);
  color: white;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(30,64,175,0.2);
}

.sidebar-item .si-icon {
  font-size: 20px;
  width: 28px;
  text-align: center;
}

.sidebar-footer {
  padding: 12px 20px;
  font-size: 11px;
  color: var(--text-light);
  border-top: 1px solid var(--border);
}

/* ========== 主内容区域 ========== */
.main-area {
  margin-left: 220px;
  padding-top: var(--header-height);
  padding-bottom: 24px;
  min-height: 100vh;
}

.content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px;
}

.tab-content {
  display: none;
  animation: fadeIn 0.25s ease;
}

.tab-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 底部Tab栏（仅移动端显示） ========== */
.tab-bar {
  display: none;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  color: var(--text-light);
  cursor: pointer;
  padding: 6px 8px;
  border: none;
  background: none;
  transition: color 0.2s;
  -webkit-user-select: none;
  user-select: none;
  flex: 1;
  min-width: 0;
}

.tab-item .tab-icon { font-size: 20px; line-height: 1; }
.tab-item.active { color: var(--primary); font-weight: 600; }

/* ========== 卡片通用样式 ========== */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 16px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

/* ========== 按钮 ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:active { transform: scale(0.97); }

.btn-outline {
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-outline:hover { background: var(--primary-soft); }

.btn-danger {
  background: var(--danger);
  color: white;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 6px;
}

.btn-block {
  width: 100%;
}

/* 上传区域 */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-area:hover {
  border-color: var(--primary);
  background: var(--primary-softer);
}

/* 诊断报告样式 */
.diagnosis-report {
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
}
.diagnosis-report h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  margin: 12px 0 6px;
}
.diagnosis-report p { margin-bottom: 8px; }
.diagnosis-report ul, .diagnosis-report ol {
  padding-left: 1.2rem;
  margin-bottom: 8px;
}
.diagnosis-report li { margin-bottom: 4px; }
.diagnosis-report table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}
.diagnosis-report th, .diagnosis-report td {
  border: 1px solid var(--border);
  padding: 6px 8px;
  font-size: 12px;
  text-align: left;
}
.diagnosis-report th {
  background: var(--primary-softer);
  font-weight: 600;
}

/* 历史诊断项 */
.history-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: var(--primary-softer); }

/* 成绩概览 */
.score-grid { display: flex; flex-direction: column; gap: 8px; }
.score-item { display: flex; align-items: center; gap: 10px; }
.score-subject { width: 90px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.score-priority { font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: 700; color: white; flex-shrink: 0; }
.score-p0 { background: var(--danger); }
.score-p1 { background: var(--warning); }
.score-p2 { background: var(--text-secondary); }
.score-p3 { background: var(--success); }
.score-bar-track { flex: 1; height: 20px; background: var(--primary-softer); border-radius: 10px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 10px; font-size: 11px; color: white; font-weight: 600; display: flex; align-items: center; padding-left: 8px; transition: width 0.5s ease; min-width: 30px; }

/* 科目分区标签 */
.group-label {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  background: var(--bg);
  margin: 8px 0 4px;
  border-radius: var(--radius);
}
.group-label-core { color: var(--primary); }
.group-label-extra { color: var(--success); }

/* loading动画 */
.loading-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.loading-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--primary);
  animation: bounceDot 1.4s infinite ease-in-out both;
}
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounceDot {
  0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* ========== 首页样式 ========== */
.welcome-section {
  background: var(--gradient-primary);
  color: white;
  padding: 20px 16px;
  margin: 0;
  border-radius: 0;
}

.welcome-greeting {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.welcome-subtitle {
  font-size: 13px;
  opacity: 0.85;
  margin-bottom: 16px;
}

.welcome-stats {
  display: flex;
  align-items: center;
  justify-content: space-around;
}

.stat-item { text-align: center; }

.stat-circle {
  width: 70px;
  height: 70px;
  position: relative;
}

.stat-circle svg {
  width: 70px;
  height: 70px;
  transform: rotate(-90deg);
}

.stat-circle .circle-bg {
  fill: none;
  stroke: rgba(255,255,255,0.2);
  stroke-width: 6;
}

.stat-circle .circle-progress {
  fill: none;
  stroke: white;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}

.stat-circle .circle-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  font-weight: 700;
}

.stat-info {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.85;
}

.streak-info {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}

.streak-info span {
  display: block;
  font-size: 11px;
  font-weight: 400;
  opacity: 0.85;
  margin-top: 2px;
}

/* 今日任务 */
.today-task {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.today-task:last-child { border-bottom: none; }

.task-info { flex: 1; }

.task-label {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}

.task-detail {
  font-size: 12px;
  color: var(--text-secondary);
}

/* 科目网格 */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 0;
  margin-bottom: 12px;
}

.subject-mini-card {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
}

.subject-mini-card:active { transform: scale(0.96); }

.subject-mini-card .emoji { font-size: 24px; margin-bottom: 4px; }
.subject-mini-card .name { font-size: 12px; font-weight: 500; margin-bottom: 6px; }

.mini-progress-bar {
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 2px;
}

.mini-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.subject-mini-card .progress-text { font-size: 10px; color: var(--text-secondary); }

/* 统计条 */
.stat-bar-item {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.stat-bar-label {
  font-size: 12px;
  width: 48px;
  text-align: right;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.stat-bar-track {
  flex: 1;
  height: 16px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  font-size: 9px;
  color: white;
  font-weight: 600;
  min-width: 28px;
}

/* ========== 科目Tab ========== */
.subject-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 8px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.subject-card:active { transform: scale(0.98); }

.subject-card .card-emoji { font-size: 32px; flex-shrink: 0; }

.subject-card-info { flex: 1; }

.subject-card-info .s-name {
  font-size: 15px;
  font-weight: 600;
}

.subject-card-info .s-teacher {
  font-size: 12px;
  color: var(--text-secondary);
}

.subject-card-right { text-align: right; flex-shrink: 0; }

.subject-card-right .s-percent {
  font-size: 16px;
  font-weight: 700;
}

.subject-card-right .s-arrow {
  color: var(--text-light);
  font-size: 18px;
}

.topic-dots {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  padding-left: 44px;
}

.topic-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all 0.3s;
}

.topic-dot.completed {
  background: var(--success);
  border-color: var(--success);
}

/* 科目详情 */
.detail-teacher-card {
  background: var(--primary-softer);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.detail-teacher-card .t-avatar { font-size: 40px; }
.detail-teacher-card .t-info .t-name { font-size: 16px; font-weight: 600; }
.detail-teacher-card .t-info .t-title { font-size: 12px; color: var(--text-secondary); }
.detail-teacher-card .t-info .t-style { font-size: 12px; color: var(--text-light); margin-top: 4px; }

.topic-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.topic-list-item:last-child { border-bottom: none; }

.topic-checkbox {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 14px;
  color: transparent;
}

.topic-checkbox.checked {
  background: var(--success);
  border-color: var(--success);
  color: white;
  animation: checkBounce 0.3s ease;
}

@keyframes checkBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.topic-info { flex: 1; }

.topic-info .t-num {
  font-size: 11px;
  color: var(--text-light);
}

.topic-info .t-name {
  font-size: 14px;
  font-weight: 500;
}

.topic-info .t-name.completed-text {
  text-decoration: line-through;
  color: var(--text-light);
}

.topic-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* ========== 出卷Tab ========== */
.exam-form-section {
  margin-bottom: 16px;
}

.exam-form-section label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.checkbox-group, .radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.checkbox-item, .radio-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  cursor: pointer;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: all 0.2s;
  background: white;
}

.checkbox-item.selected, .radio-item.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary-dark);
  font-weight: 500;
}

.checkbox-item input, .radio-item input { display: none; }

.exam-range {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  padding: 8px;
  background: var(--primary-softer);
  border-radius: 8px;
}

/* 试卷展示 */
.exam-paper {
  padding: 16px;
  margin: 12px 16px;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.exam-paper h2 {
  text-align: center;
  font-size: 18px;
  margin-bottom: 8px;
}

.exam-paper h3 {
  font-size: 14px;
  margin: 16px 0 8px;
  padding-left: 8px;
  border-left: 3px solid var(--primary);
}

.exam-paper p, .exam-paper li {
  font-size: 13px;
  line-height: 1.8;
}

.exam-paper ol, .exam-paper ul { padding-left: 20px; }

.answers-section {
  border-top: 2px dashed var(--border);
  margin-top: 16px;
  padding-top: 16px;
}

.loading-dots {
  display: inline-flex;
  gap: 4px;
  padding: 12px 16px;
}

.loading-dots span {
  width: 8px;
  height: 8px;
  background: var(--primary);
  border-radius: 50%;
  animation: dotBounce 1.4s infinite ease-in-out both;
}

.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ========== 答疑Tab ========== */
.teacher-scroll {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.teacher-scroll::-webkit-scrollbar { display: none; }

.teacher-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  min-width: 72px;
}

.teacher-chip.selected {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.teacher-chip .tc-avatar { font-size: 24px; }
.teacher-chip .tc-name { font-size: 11px; font-weight: 500; }
.teacher-chip .tc-subject { font-size: 10px; color: var(--text-secondary); }

/* 聊天区域 */
.chat-area {
  padding: 12px 16px;
  min-height: 400px;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* 语音朗读按钮 */
.tts-bar {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.08);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  color: var(--primary);
  border: 1px solid rgba(37, 99, 235, 0.15);
}
.tts-bar:hover {
  background: rgba(37, 99, 235, 0.15);
  border-color: var(--primary);
}
.tts-bar.speaking {
  background: var(--gradient-primary);
  color: white;
  border-color: transparent;
  animation: ttsPulse 1.5s ease-in-out infinite;
}
.tts-bar .tts-btn { font-size: 14px; line-height: 1; }
.tts-bar .tts-label { font-size: 11px; }

@keyframes ttsPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.3); }
  50% { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }
}

.chat-msg {
  margin-bottom: 12px;
  display: flex;
  gap: 8px;
}

.chat-msg.user {
  flex-direction: row-reverse;
}

.chat-msg .msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  background: var(--border);
}

.chat-msg .msg-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  word-break: break-word;
}

.chat-msg.assistant .msg-bubble {
  background: white;
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.chat-msg.user .msg-bubble {
  background: var(--primary);
  color: white;
  border-top-right-radius: 4px;
}

.chat-input-area {
  padding: 10px 16px;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  border-radius: 0 0 var(--radius) var(--radius);
}

.chat-input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 14px;
  font-family: var(--font);
  resize: none;
  min-height: 38px;
  max-height: 100px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input-area textarea:focus { border-color: var(--primary); }

.chat-send-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

.chat-send-btn:hover { background: var(--primary-dark); }

/* 思考动画 */
.thinking-indicator {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px 14px;
}

.thinking-indicator .dots {
  display: flex;
  gap: 3px;
}

.thinking-indicator .dots span {
  width: 6px;
  height: 6px;
  background: var(--text-light);
  border-radius: 50%;
  animation: dotBounce 1.4s infinite ease-in-out both;
}

.thinking-indicator .dots span:nth-child(1) { animation-delay: -0.32s; }
.thinking-indicator .dots span:nth-child(2) { animation-delay: -0.16s; }

/* ========== 我的Tab ========== */
.profile-card {
  text-align: center;
  padding: 24px 16px;
}

.profile-card .p-avatar {
  font-size: 48px;
  margin-bottom: 8px;
}

.profile-card .p-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.profile-card .p-name input {
  border: none;
  border-bottom: 1px dashed var(--border);
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  font-family: var(--font);
  outline: none;
  padding: 2px 8px;
  width: 120px;
}

.profile-stats {
  display: flex;
  justify-content: space-around;
  margin-top: 12px;
}

.profile-stat { text-align: center; }

.profile-stat .ps-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.profile-stat .ps-label {
  font-size: 11px;
  color: var(--text-secondary);
}

.goal-selector {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
}

.goal-option {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  background: white;
}

.goal-option.selected {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

/* 设置项 */
.settings-section { margin-bottom: 8px; }

.settings-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.settings-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.settings-item:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }

.settings-item label {
  font-size: 13px;
  font-weight: 500;
  width: 72px;
  flex-shrink: 0;
}

.settings-item input[type="text"],
.settings-item input[type="password"],
.settings-item input[type="url"] {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
}

.settings-item input:focus { border-color: var(--primary); }

.password-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
}

.password-wrapper input { flex: 1; }

.password-toggle {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  padding: 4px;
  color: var(--text-secondary);
}

.settings-help {
  font-size: 11px;
  color: var(--text-light);
  padding: 8px 16px;
  line-height: 1.5;
}

/* ========== 庆祝动画 ========== */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -10px;
  border-radius: 2px;
  animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* 祝贺弹窗 */
.celebration-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 998;
  animation: fadeIn 0.3s ease;
}

.celebration-modal {
  background: white;
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  max-width: 300px;
  width: 90%;
  animation: modalPop 0.3s ease;
}

@keyframes modalPop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.celebration-modal .cele-emoji { font-size: 56px; margin-bottom: 12px; }
.celebration-modal .cele-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.celebration-modal .cele-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}

.empty-state .empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 14px; }

/* ========== 确认弹窗 ========== */
.confirm-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 998;
  animation: fadeIn 0.2s ease;
}

.confirm-modal {
  background: white;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  max-width: 280px;
  width: 85%;
  animation: modalPop 0.2s ease;
}

.confirm-modal .cm-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.confirm-modal .cm-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.confirm-modal .cm-actions { display: flex; gap: 10px; justify-content: center; }

/* 滚动条美化 */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ========== 移动端适配（768px以下） ========== */
@media (max-width: 768px) {
  /* 隐藏侧边栏，显示底部Tab栏 */
  .sidebar { display: none; }
  .tab-bar {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: var(--tab-height);
    background: white;
    align-items: center;
    justify-content: space-around;
    border-top: 1px solid var(--border);
    z-index: 100;
    box-shadow: 0 -1px 4px rgba(0,0,0,0.04);
  }

  /* 主内容区域全宽 */
  .main-area {
    margin-left: 0;
    padding-bottom: calc(var(--tab-height) + 16px);
  }
  .content {
    padding: 0 12px;
  }

  /* 标题栏 */
  .header { padding: 0 12px; font-size: 16px; }

  /* 欢迎区域 */
  .welcome-section { padding: 16px 12px; }
  .welcome-greeting { font-size: 16px; }
  .welcome-stats { gap: 8px; }
  .stat-circle { width: 56px; height: 56px; }
  .stat-circle svg { width: 56px; height: 56px; }
  .stat-circle .circle-text { font-size: 13px; }
  .streak-info { font-size: 20px; }

  /* 科目网格改为2列 */
  .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* 卡片内边距缩小 */
  .card { padding: 12px; margin: 8px 12px; }

  /* 聊天输入框固定到底部 */
  .chat-input-area {
    position: fixed;
    bottom: var(--tab-height);
    left: 0;
    width: 100%;
    border-radius: 0;
  }

  /* 聊天区域高度调整 */
  .chat-area {
    max-height: calc(100vh - 280px);
  }

  /* 消息气泡宽度调整 */
  .chat-msg .msg-bubble { max-width: 80%; font-size: 13px; }

  /* 统计条标签宽度 */
  .stat-bar-label { width: 36px; font-size: 11px; }

  /* 试卷区域 */
  .exam-paper { margin: 8px 12px; padding: 12px; }
}

/* ========== 平板适配（769px-1024px） ========== */
@media (min-width: 769px) and (max-width: 1024px) {
  .main-area { margin-left: 200px; }
  .sidebar { width: 200px; }
  .content { max-width: 760px; padding: 0 16px; }
  .subject-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ========== 大屏优化（1200px+） ========== */
@media (min-width: 1200px) {
  .subject-grid { grid-template-columns: repeat(3, 1fr); }
  .content { max-width: 960px; }
  .welcome-stats { max-width: 500px; margin: 0 auto; }
}

/* ========== 打印支持 ========== */
@media print {
  .header, .sidebar, .tab-bar, .chat-input-area { display: none !important; }
  .main-area { margin-left: 0 !important; }
  .content { max-width: 100% !important; }
  body { background: white; }
  .app-container { box-shadow: none; }
  .tab-content { display: none !important; }
  .tab-content.active { display: block !important; }
  .exam-paper { box-shadow: none; margin: 0; padding: 0; }
}

/* ================================================================
   UI 审查升级新增样式（P0-3 ~ P2-3），全部追加，不覆盖原结构
   ================================================================ */

/* ========== 首页新增组件（P0-3） ========== */
.task-topic {
  color: var(--primary-dark);
  font-weight: 600;
  font-size: 12px;
}

.next-step-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--primary-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 12px 16px;
}

.next-step-card .next-step-emoji { font-size: 28px; flex-shrink: 0; }
.next-step-card .next-step-text { flex: 1; }
.next-step-card .next-step-title { font-size: 14px; font-weight: 600; color: var(--primary-dark); }
.next-step-card .next-step-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.6; }

.empty-hero {
  margin: 16px;
  padding: 28px 20px;
  text-align: center;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px dashed var(--primary-light);
  box-shadow: var(--shadow);
}

.empty-hero .empty-hero-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: var(--gradient-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 6px 16px rgba(30,64,175,0.25);
}

.empty-hero .empty-hero-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.empty-hero .empty-hero-text { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }

/* ========== 温暖错误卡片（P0-4） ========== */
.soft-error { text-align: center; padding: 32px 20px; }
.soft-error .soft-error-emoji {
  width: 64px;
  height: 64px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: var(--primary-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}
.soft-error .soft-error-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.soft-error .soft-error-text { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 8px; }
.soft-error .soft-error-detail { font-size: 11px; color: var(--text-light); margin-bottom: 16px; word-break: break-all; }

/* ========== 鼓励 Toast（P0-5） ========== */
.encourage-toast {
  position: fixed;
  top: calc(var(--header-height) + 12px);
  left: 50%;
  transform: translate(-50%, -16px);
  background: white;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 20px;
  box-shadow: 0 8px 24px rgba(30,64,175,0.2);
  z-index: 1000;
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
  pointer-events: none;
  max-width: 86vw;
}
.encourage-toast.show { opacity: 1; transform: translate(-50%, 0); }
.encourage-toast .et-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); }
.encourage-toast .et-text { font-size: 12px; color: var(--text-secondary); }

/* ========== 徽章墙（P0-5） ========== */
.badge-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.badge-item {
  text-align: center;
  padding: 12px 6px;
  border-radius: 12px;
  background: var(--primary-softer);
  border: 1px solid var(--border);
  filter: grayscale(1);
  opacity: 0.55;
  transition: all 0.3s;
}
.badge-item.got {
  filter: none;
  opacity: 1;
  background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%);
  border-color: #fcd34d;
  box-shadow: 0 2px 8px rgba(251,191,36,0.2);
}
.badge-item .badge-icon { font-size: 26px; margin-bottom: 4px; }
.badge-item .badge-name { font-size: 12px; font-weight: 700; }
.badge-item .badge-desc { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
.badge-count { font-size: 10px; color: var(--text-light); margin-top: 2px; }

/* 成绩编辑 */
.score-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.score-edit-item { display: flex; align-items: center; gap: 8px; }
.score-edit-item label { font-size: 13px; font-weight: 600; min-width: 60px; flex-shrink: 0; }
.score-input {
  flex: 1; min-width: 0;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 8px; font-size: 14px; font-weight: 600;
  color: var(--primary); background: var(--primary-softer);
  outline: none; width: 60px; text-align: center;
  transition: border-color 0.2s;
}
.score-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
@media (max-width: 640px) { .score-edit-grid { grid-template-columns: 1fr; } }

@media (max-width: 768px) {
  .badge-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}

/* ========== 新手引导（P0-6） ========== */
.onboard-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(63,63,70,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
  animation: fadeIn 0.3s ease;
}
.onboard-overlay.fade-out { opacity: 0; transition: opacity 0.3s; }
.onboard-modal {
  background: white;
  border-radius: 20px;
  padding: 32px 28px 24px;
  max-width: 320px;
  width: 88%;
  text-align: center;
  animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.onboard-modal .onboard-emoji {
  width: 76px; height: 76px;
  margin: 0 auto 14px;
  border-radius: 50%;
  background: var(--gradient-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  box-shadow: 0 8px 20px rgba(30,64,175,0.3);
}
.onboard-modal .onboard-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.onboard-modal .onboard-text { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 16px; }
.onboard-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 18px; }
.onboard-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: all 0.25s; }
.onboard-dot.active { background: var(--primary); width: 18px; border-radius: 4px; }
.onboard-skip {
  margin-top: 10px;
  background: none; border: none;
  font-size: 12px; color: var(--text-light);
  cursor: pointer; font-family: var(--font);
}

/* ========== API 配置友好化（P0-6） ========== */
.api-guide { display: flex; flex-direction: column; gap: 8px; }
.api-guide-step {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
}
.api-guide-num {
  width: 18px; height: 18px; flex-shrink: 0;
  border-radius: 50%;
  background: var(--gradient-primary);
  color: white;
  font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.api-advanced {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.api-advanced summary {
  cursor: pointer;
  padding: 8px 0;
  outline: none;
  -webkit-user-select: none;
  user-select: none;
}
.api-tip-bar {
  margin-top: 12px;
  padding: 10px 14px;
  background: #fffbeb;
  border: 1px solid #fcd34d;
  border-radius: 10px;
  font-size: 12px;
  color: #92400e;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.api-tip-bar:hover { background: #fef3c7; }

/* ========== 触摸目标 & 底部Tab（P0-7） ========== */
.checkbox-item, .radio-item {
  padding: 11px 14px;
  font-size: 13px;
  border-radius: 10px;
  min-height: 44px;
}

.topic-checkbox {
  width: 28px;
  height: 28px;
  position: relative;
}
.topic-checkbox::after {
  content: '';
  position: absolute;
  top: -8px; left: -8px; right: -8px; bottom: -8px;
}

.tab-item {
  padding: 8px 4px 6px;
  font-size: 11px;
  min-height: 50px;
  position: relative;
}
.tab-item .tab-icon { font-size: 22px; line-height: 1; }
.tab-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 24px;
  height: 3px;
  border-radius: 0 0 3px 3px;
  background: var(--gradient-primary);
  transition: transform 0.25s ease;
}
.tab-item.active::before { transform: translateX(-50%) scaleX(1); }

@media (max-width: 768px) {
  .btn-danger.btn-sm { padding: 8px 12px; font-size: 12px; min-height: 32px; }
  .btn-sm { padding: 8px 14px; min-height: 36px; }
  .chat-send-btn { width: 42px; height: 42px; }
}

/* ========== 卡片质感升级（P1-1） ========== */
.card {
  position: relative;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gradient-primary);
  opacity: 0.35;
}

.subject-mini-card {
  border: 1px solid var(--border);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
@media (hover: hover) {
  .subject-mini-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
}

.subject-card {
  border: 1px solid var(--border);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
@media (hover: hover) {
  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
}

.detail-teacher-card {
  position: relative;
  overflow: hidden;
}
.detail-teacher-card::after {
  content: '';
  position: absolute;
  right: -30px;
  top: -30px;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.14) 0%, rgba(37,99,235,0) 70%);
  pointer-events: none;
}

/* ========== 进度可视化增强（P1-2） ========== */
.mini-progress-bar {
  height: 6px;
  background: var(--primary-soft);
}
.mini-progress-fill {
  box-shadow: 0 0 6px rgba(30,64,175,0.25);
}

.stat-bar-track {
  background: var(--primary-softer);
  height: 18px;
}
.stat-bar-fill {
  box-shadow: inset 0 -6px 10px rgba(255,255,255,0.35);
}

.topic-dot {
  width: 14px;
  height: 14px;
  border-width: 1.5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.topic-dot.completed {
  background: var(--success);
  border-color: var(--success);
}
.topic-dot.completed::after {
  content: '✓';
  color: white;
  font-size: 8px;
  font-weight: 700;
  line-height: 1;
}

.stat-circle .circle-text { text-shadow: 0 1px 4px rgba(0,0,0,0.12); }

/* ========== 字体层级（P1-3） ========== */
.welcome-greeting { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
.welcome-subtitle { font-size: 13px; opacity: 0.9; }

.card-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::before {
  content: '';
  width: 4px;
  height: 16px;
  border-radius: 2px;
  background: var(--gradient-primary);
  flex-shrink: 0;
}

.subject-card-info .s-name { font-size: 16px; }
.topic-info .t-name { font-size: 14.5px; }

/* ========== emoji 图标底托（P1-4） ========== */
.subject-mini-card .emoji {
  width: 44px;
  height: 44px;
  margin: 0 auto 6px;
  border-radius: 14px;
  background: var(--primary-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.subject-card .card-emoji {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: var(--primary-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  flex-shrink: 0;
}

.detail-teacher-card .t-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--primary-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}

.teacher-chip .tc-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--primary-softer);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.chat-msg .msg-avatar {
  background: var(--primary-soft);
  border: 1px solid var(--border);
}

/* ========== 聊天界面优化（P1-5） ========== */
.chat-msg.user .msg-bubble {
  background: var(--gradient-primary);
  color: white;
  border-top-right-radius: 4px;
  box-shadow: 0 2px 8px rgba(30,64,175,0.25);
}

.chat-msg.assistant .msg-bubble {
  background: var(--primary-softer);
  border: 1px solid var(--border);
}

.teacher-chip {
  position: relative;
  background: white;
}
.teacher-chip.selected {
  border-color: transparent;
  background:
    linear-gradient(white, white) padding-box,
    var(--gradient-primary) border-box;
  box-shadow: 0 3px 10px rgba(30,64,175,0.18);
}

@media (min-width: 769px) {
  .chat-input-area {
    position: sticky;
    bottom: 0;
    z-index: 10;
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: 0 -4px 12px rgba(30,64,175,0.06);
  }
}

.tts-bar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 999px;
}
.tts-bar.speaking {
  background: var(--gradient-primary);
  color: white;
  border-color: transparent;
}

/* ========== 诊断步骤条（P1-6） ========== */
.diag-steps {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}
.diag-step {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-light);
  white-space: nowrap;
}
.diag-step .diag-step-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.diag-step.active { color: var(--primary-dark); font-weight: 600; }
.diag-step.active .diag-step-num { background: var(--gradient-primary); color: white; }
.diag-step.done { color: var(--success); }
.diag-step.done .diag-step-num { background: var(--success); color: white; }
.diag-step-line { flex: 1; height: 2px; background: var(--border); margin: 0 8px; border-radius: 1px; min-width: 16px; }
.diag-step-line.done { background: var(--success); }

/* ========== 科目详情优化（P1-7） ========== */
.btn-ask {
  background: var(--gradient-primary);
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(30,64,175,0.3);
}
.btn-ask:hover { opacity: 0.92; background: var(--gradient-primary); }
.topic-actions .btn-sm { font-size: 11px; padding: 6px 10px; }

/* ========== 大屏利用（P1-8） ========== */
@media (min-width: 1600px) {
  .content { max-width: 1200px; }
  .subject-grid { grid-template-columns: repeat(4, 1fr); }
  #tab-home { display: grid; grid-template-columns: 1fr 1fr; column-gap: 0; align-items: start; }
  #tab-home .welcome-section, #tab-home .empty-hero { grid-column: 1 / -1; }
}

/* ========== 回到顶部（P1-8） ========== */
.back-to-top {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--gradient-primary);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(30,64,175,0.35);
  z-index: 90;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: all 0.3s ease;
  font-family: var(--font);
}
.back-to-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
@media (max-width: 768px) {
  .back-to-top { right: 16px; bottom: calc(var(--tab-height) + 16px); }

/* ========== 微交互统一（P1-9） ========== */
.btn { transition: all 0.18s ease; }
.btn:active { transform: scale(0.97); }

.sidebar-item { transition: all 0.22s ease; }
.sidebar-item.active { transform: translateX(2px); }

.teacher-chip, .goal-option, .checkbox-item, .radio-item {
  transition: all 0.18s ease;
}
.teacher-chip:active, .goal-option:active { transform: scale(0.96); }

.stat-item { animation: statPop 0.5s ease backwards; }
.stat-item:nth-child(2) { animation-delay: 0.08s; }
.stat-item:nth-child(3) { animation-delay: 0.16s; }
@keyframes statPop {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ========== 主题换装（P2-1） ========== */
.theme-row { display: flex; gap: 12px; justify-content: space-around; }
.theme-item {
  text-align: center;
  cursor: pointer;
  padding: 8px 10px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.theme-item.active { border-color: var(--primary); background: var(--primary-soft); }
.theme-item .theme-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  margin: 0 auto 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}
.theme-item .theme-name { font-size: 11px; color: var(--text-secondary); }

/* ========== 暗色模式（P2-2，跟随系统） ========== */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-light: #64748b;
    --border: #334155;
    --primary-soft: #1c2a45;
    --primary-softer: #16223a;
    --shadow: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.5);

  body { background: var(--bg); }
  .sidebar { background: var(--card); border-right-color: var(--border); box-shadow: none; }
  .tab-bar { background: var(--card) !important; border-top-color: var(--border) !important; }
  .card, .subject-mini-card, .subject-card { background: var(--card); border-color: var(--border); }
  .teacher-chip { background: var(--card); border-color: var(--border); }
  .teacher-chip.selected {
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      var(--gradient-primary) border-box;
  }
  .checkbox-item, .radio-item { background: var(--card); border-color: var(--border); }
  .goal-option { background: var(--card); border-color: var(--border); }
  .settings-item { background: var(--card); border-bottom-color: var(--border); }
  .settings-item input[type="text"],
  .settings-item input[type="password"],
  .settings-item input[type="url"] {
    background: var(--bg); color: var(--text); border-color: var(--border);

  .chat-input-area { background: var(--card); border-top-color: var(--border); }
  .chat-input-area textarea { background: var(--bg); color: var(--text); border-color: var(--border); }
  .chat-msg.assistant .msg-bubble { background: var(--card); border-color: var(--border); }

  .tts-bar { background: var(--card); }
  .badge-item { background: var(--primary-softer); border-color: var(--border); }
  .badge-item.got { background: #3a2f14; border-color: #b45309; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
}

/* 读取状态 */
function loadState() {
  try {
    const saved = localStorage.getItem('studySystem');
    if (saved) {
      state = { ...DEFAULT_STATE, ...JSON.parse(saved) };
      state.config = { ...DEFAULT_STATE.config, ...(JSON.parse(saved).config || {}) };
      state.examSettings = { ...DEFAULT_STATE.examSettings, ...(JSON.parse(saved).examSettings || {}) };
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  } catch (e) {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}

/* 保存状态 */
function saveState() {
  try {
    localStorage.setItem('studySystem', JSON.stringify(state));
  } catch (e) {
    console.error('保存状态失败:', e);
  }
}

/* 计算科目完成进度 */
function getSubjectProgress(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return { completed: 0, total: 8, percent: 0 };
  let completed = 0;
  subject.topics.forEach((_, i) => {
    if (state.progress[`${subjectId}_${i}`]) completed++;
  });
  return { completed, total: 8, percent: Math.round((completed / 8) * 100) };
}

/* 获取总完成专题数 */
function getTotalCompleted() {
  let count = 0;
  SUBJECTS.forEach(s => {
    count += getSubjectProgress(s.id).completed;
  });
  return count;
}

/* 获取连续学习天数 */
function getStreakDays() {
  if (!state.studyDays || state.studyDays.length === 0) return 0;
  const sorted = [...state.studyDays].sort().reverse();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

  if (!sorted.includes(today) && !sorted.includes(yesterday)) return 0;

  let streak = 0;
  let checkDate = new Date(sorted[0]);
  for (let i = 0; i < sorted.length; i++) {
    const expected = new Date(checkDate).toISOString().split('T')[0];
    if (sorted[i] === expected) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else if (sorted[i] < expected) {
      break;
    }
  }
  return streak;
}

/* 记录今天学习了 */
function recordStudyToday() {
  const today = new Date().toISOString().split('T')[0];
  if (!state.studyDays.includes(today)) {
    state.studyDays.push(today);
    saveState();
  }
}

/* 简单Markdown渲染 */
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:var(--primary-softer);padding:2px 4px;border-radius:4px;font-size:12px;">$1</code>')
    .replace(/\n/g, '<br>');
}

/* 获取已完成和未完成专题 */
function getCompletedTopics(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return { completed: [], remaining: [] };
  const completed = [];
  const remaining = [];
  subject.topics.forEach((topic, i) => {
    if (state.progress[`${subjectId}_${i}`]) {
      completed.push(topic);
    } else {
      remaining.push(topic);
    }
  });
  return { completed, remaining };
}

/* 获取学科的system prompt */
function getSystemPrompt(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return '';
  const { completed, remaining } = getCompletedTopics(subjectId);
  return `你是${subject.teacher.name}，${subject.teacher.title}。\n你的教学风格：${subject.teacher.style}\n\n你现在在辅导一名高一升高二的学生暑假复习${subject.name}。这名学生的情况：\n- 高一下学期转去学音乐（竹笛），文化课基础薄弱\n- 现在暑假正在系统补课\n- 已完成的专题：${completed.length > 0 ? completed.join('、') : '暂无'}\n- 未完成的专题：${remaining.length > 0 ? remaining.join('、') : '暂无'}\n\n请以你的教学风格回答学生的问题。要求：\n1. 回答要通俗易懂，适合基础薄弱的学生\n2. 多用例子和类比帮助理解\n3. 如果学生问的内容超出已学范围，可以先简单介绍，但建议先打好基础\n4. 适当鼓励学生，建立信心\n5. 回答要简洁，不要太长（每次回复控制在300字以内）\n6. 紧扣高考考点`;

  // 更新Tab高亮（底部Tab栏 + 侧边栏）

    el.classList.toggle('active', el.dataset.tab === state.currentTab);
  });
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === state.currentTab);
  });

  // 更新Tab内容显示
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });

  const contentEl = document.getElementById(`tab-${state.currentTab}`);
  if (contentEl) contentEl.classList.add('active');

  // 更新标题栏
  const headerTitle = document.getElementById('headerTitle');
  const backBtn = document.getElementById('backBtn');

  if (state.currentSubject && state.currentTab === 'subjects') {
    const subject = SUBJECTS.find(s => s.id === state.currentSubject);
    headerTitle.textContent = subject ? subject.name : '科目详情';
    backBtn.classList.add('show');
  } else if (state.currentTab === 'home') {
    headerTitle.textContent = '新高二暑假学习系统';
    backBtn.classList.remove('show');
  } else if (state.currentTab === 'subjects') {
    headerTitle.textContent = '科目进度';
    backBtn.classList.remove('show');
  } else if (state.currentTab === 'exam') {
    headerTitle.textContent = 'AI智能组卷';
    backBtn.classList.remove('show');
  } else if (state.currentTab === 'diagnosis') {
    headerTitle.textContent = '试卷诊断';
    backBtn.classList.remove('show');
  } else if (state.currentTab === 'chat') {
    headerTitle.textContent = 'AI老师答疑';
    backBtn.classList.remove('show');
  } else if (state.currentTab === 'me') {
    headerTitle.textContent = '我的';
    backBtn.classList.remove('show');
  }

  // 渲染各Tab内容
  renderHome();
  renderSubjects();
  renderExam();
  renderDiagnosis();
  renderChat();
  renderMe();
}

/* 获取某科目下一个未完成专题（P0-3） */
function getNextTopicInfo(subjectId) {
  const subject = SUBJECTS.find(s => s.id === subjectId);
  if (!subject) return null;
  for (let i = 0; i < subject.topics.length; i++) {
    if (!state.progress[`${subjectId}_${i}`]) {
      return { index: i, name: subject.topics[i] };
    }
  }
  return null; // 全部完成
}

/* 获取进度最落后的科目（P0-3，用于"下一步建议"） */
function getWeakestSubject() {
  let weakest = null;
  let lowest = 101;
  SUBJECTS.forEach(s => {
    const p = getSubjectProgress(s.id);
    if (p.percent < lowest) {
      lowest = p.percent;
      weakest = s;
    }
  });
  return weakest;
}

function toggleExamSubject(subjectId, el) {
  const idx = state.examSettings.subjects.indexOf(subjectId);
  if (idx > -1) {
    state.examSettings.subjects.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.examSettings.subjects.push(subjectId);
    el.classList.add('selected');
  }
  saveState();
  getExamRangeHtml();
  document.getElementById('examRange').innerHTML = getExamRangeHtml();
}

function toggleExamType(typeName, el) {
  const idx = state.examSettings.types.indexOf(typeName);
  if (idx > -1) {
    state.examSettings.types.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    state.examSettings.types.push(typeName);
    el.classList.add('selected');
  }
  saveState();
}

function setExamCount(count, el) {
  state.examSettings.questionCount = count;
  saveState();
  el.parentElement.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
}

function setExamDifficulty(diff, el) {
  state.examSettings.difficulty = diff;
  saveState();
  el.parentElement.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
}

function getExamRangeHtml() {
  const subjects = state.examSettings.subjects;
  if (subjects.length === 0) {
    return '<span style="color:var(--text-light);">请先选择考试科目</span>';
  }
  let html = '';
  subjects.forEach(sid => {
    const subject = SUBJECTS.find(s => s.id === sid);
    const { completed } = getCompletedTopics(sid);
    html += `<div style="margin-bottom:4px;">${subject.icon} ${subject.name}：${completed.length > 0 ? completed.join('、') : '<span style="color:var(--text-light);">暂无已完成专题</span>'}</div>`;
  });
  return html;
}

/* ========== 开始出卷 ========== */
async function startExam() {
  const cfg = getConfig();
  if (!cfg.apiKey) {
    showConfirm('未配置AI接口', '请先在「我的」页面配置AI接口后再出卷。是否前往配置？', () => {
      switchTab('me');
    });
    return;
  }
  if (state.examSettings.subjects.length === 0) {
    alert('请至少选择一个考试科目');
    return;
  }
  if (state.examSettings.types.length === 0) {
    alert('请至少选择一种题型');
    return;
  }

  const el = document.getElementById('tab-exam');

  // 收集已完成专题
  const subjectsInfo = state.examSettings.subjects.map(sid => {

      </div>

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let content = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

/* 处理试卷上传 */
function handlePaperUpload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;

  if (!state.diagnosisImages) state.diagnosisImages = [];

  const remainingFiles = files.length;
  let loaded = 0;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      state.diagnosisImages.push(e.target.result);
      loaded++;
      if (loaded === remainingFiles) {
        saveState();
        renderDiagnosis();
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

/* 删除诊断图片 */
function removeDiagnosisImage(index) {
  if (state.diagnosisImages) {
    state.diagnosisImages.splice(index, 1);
    saveState();
    renderDiagnosis();
  }
}

function handleChatKeydown(event) {

/* ========== 发送消息 ========== */
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  const subjectId = state.currentTeacher;

  // 保存用户消息
  if (!state.chatHistory[subjectId]) state.chatHistory[subjectId] = [];
  state.chatHistory[subjectId].push({ role: 'user', content: message, timestamp: Date.now() });
  saveState();

  input.value = '';
  input.style.height = 'auto';

  // 添加用户消息到UI
  const chatArea = document.getElementById('chatArea');
  const userMsgHtml = `
    <div class="chat-msg user">
      <div class="msg-avatar">&#128100;</div>
      <div class="msg-bubble">${escapeHtml(message)}</div>
    </div>`;
  chatArea.insertAdjacentHTML('beforeend', userMsgHtml);

  // 显示思考中
  const teacher = SUBJECTS.find(s => s.id === subjectId);
  const thinkingHtml = `
    <div class="chat-msg assistant" id="thinkingMsg">
      <div class="msg-avatar">${teacher.teacher.avatar}</div>
      <div class="msg-bubble">
        <div class="thinking-indicator">
          <div class="dots"><span></span><span></span><span></span></div>
          <span style="font-size:12px;color:var(--text-light);">正在思考...</span>
        </div>
      </div>
    </div>`;
  chatArea.insertAdjacentHTML('beforeend', thinkingHtml);
  chatArea.scrollTop = chatArea.scrollHeight;

  const cfg = getConfig();

  if (!cfg.apiKey) {
    // 离线模式
    await new Promise(resolve => setTimeout(resolve, 1000));
    const reply = getOfflineResponse(subjectId);
    state.chatHistory[subjectId].push({ role: 'assistant', content: reply, timestamp: Date.now() });
    saveState();
    document.getElementById('thinkingMsg').remove();
    const replyId = `msg_offline_${Date.now()}`;
    const assistantMsgHtml = `
      <div class="chat-msg assistant">
        <div class="msg-avatar">${teacher.teacher.avatar}</div>
        <div class="msg-bubble" id="${replyId}">${renderMarkdown(reply)}
          <div class="tts-bar" onclick="speakMessage('${replyId}', this)">
            <span class="tts-btn">&#128264;</span> <span class="tts-label">朗读</span>
          </div>
        </div>
      </div>`;
    chatArea.insertAdjacentHTML('beforeend', assistantMsgHtml);
    chatArea.scrollTop = chatArea.scrollHeight;
    if (window.autoSpeakReply) window.autoSpeakReply(reply);
    return;
  }

  // 调用AI API
  try {
    const systemPrompt = getSystemPrompt(subjectId);
    const messages = state.chatHistory[subjectId].map(m => ({
      role: m.role,
      content: m.content
    }));

    const response = await fetch(cfg.apiEndpoint || 'https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.apiKey}`
      },
      body: JSON.stringify({
        model: cfg.model || 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          ...messages
        ],
        stream: true
      })
    });

    if (!response.ok) {
      throw new Error(`API调用失败（${response.status}）`);
    }

    // 替换思考消息为streaming消息
    const thinkingEl = document.getElementById('thinkingMsg');
    if (thinkingEl) {
      thinkingEl.querySelector('.msg-bubble').innerHTML = '';
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let content = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '' || trimmed === 'data: [DONE]') continue;
        if (trimmed.startsWith('data: ')) {
          try {
            const data = JSON.parse(trimmed.slice(6));
            const delta = data.choices?.[0]?.delta?.content || '';
            content += delta;
            const bubbleEl = thinkingEl?.querySelector('.msg-bubble');
            if (bubbleEl) {
              bubbleEl.innerHTML = renderMarkdown(content);
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch (e) {
            // 跳过
          }
        }
      }
    }

    // 保存完整回复
    state.chatHistory[subjectId].push({ role: 'assistant', content: content, timestamp: Date.now() });
    saveState();

    // 添加朗读按钮到streaming消息
    const streamReplyId = `msg_stream_${Date.now()}`;
    if (thinkingEl) {
      thinkingEl.id = '';
      thinkingEl.querySelector('.msg-bubble').id = streamReplyId;
      thinkingEl.querySelector('.msg-bubble').innerHTML += `
        <div class="tts-bar" onclick="speakMessage('${streamReplyId}', this)">
          <span class="tts-btn">&#128264;</span> <span class="tts-label">朗读</span>
        </div>`;
    }
    // 自动朗读老师回复
    if (window.autoSpeakReply) window.autoSpeakReply(content);

  } catch (error) {
    const thinkingEl = document.getElementById('thinkingMsg');
    if (thinkingEl) {
      thinkingEl.remove();
    }
    const errMsg = `
      <div class="chat-msg assistant">
        <div class="msg-avatar">${teacher.teacher.avatar}</div>
        <div class="msg-bubble" style="color:var(--text);background:var(--primary-soft);border:1px solid var(--border);">😅 老师这里信号不太好，刚才的问题没收到。检查下网络和接口配置，再问我一遍好不好？<br><span style="font-size:11px;color:var(--text-light);">${error.message || ''}</span></div>
      </div>`;
    chatArea.insertAdjacentHTML('beforeend', errMsg);
    // 移除最后一条失败的assistant消息（不保存）
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

/* ========== 语音朗读功能 ========== */
let currentUtterance = null;
let currentTTSBtn = null;

function speakMessage(msgId, btnEl) {
  // 如果正在朗读，先停止
  if (currentUtterance) {
    speechSynthesis.cancel();
    if (currentTTSBtn) {
      currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
      currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
      currentTTSBtn.classList.remove('speaking');
    }
    // 如果点击的是当前正在朗读的消息，则停止
    if (currentTTSBtn === btnEl) {
      currentUtterance = null;
      currentTTSBtn = null;
      return;
    }
  }

  const msgEl = document.getElementById(msgId);
  if (!msgEl) return;

  // 提取纯文本（去除HTML标签和TTS按钮文本）
  const clone = msgEl.cloneNode(true);
  const ttsBar = clone.querySelector('.tts-bar');
  if (ttsBar) ttsBar.remove();
  const text = clone.textContent || clone.innerText || '';

  if (!text.trim()) return;

  // 创建语音合成
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;

  // 尝试选择中文语音
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  // 更新按钮状态
  btnEl.querySelector('.tts-label').textContent = '停止';
  btnEl.querySelector('.tts-btn').innerHTML = '&#128263;';
  btnEl.classList.add('speaking');

  currentUtterance = utterance;
  currentTTSBtn = btnEl;

  utterance.onend = () => {
    btnEl.querySelector('.tts-label').textContent = '朗读';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
    btnEl.classList.remove('speaking');
    currentUtterance = null;
    currentTTSBtn = null;
  };

  utterance.onerror = () => {
    btnEl.querySelector('.tts-label').textContent = '朗读';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
    btnEl.classList.remove('speaking');
    currentUtterance = null;
    currentTTSBtn = null;
  };

  speechSynthesis.speak(utterance);
}

/* ========== 数据管理 ========== */
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `学习数据_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      state = { ...DEFAULT_STATE, ...data };
      state.config = { ...DEFAULT_STATE.config, ...(data.config || {}) };
      state.examSettings = { ...DEFAULT_STATE.examSettings, ...(data.examSettings || {}) };
      saveState();
      render();
      alert('数据导入成功！');
    } catch (error) {
      alert('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function confirmReset() {
  showConfirm('重置所有进度', '确定要清除所有学习进度和聊天记录吗？此操作不可恢复！', () => {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    saveState();
    render();
  });
}

    }
  ];

  let idx = 0;
  const overlay = document.createElement('div');

  function renderSlide() {
    const s = slides[idx];
    const isLast = idx === slides.length - 1;
    overlay.innerHTML = `
      <div class="onboard-modal">
        <div class="onboard-emoji">${s.emoji}</div>
        <div class="onboard-title">${s.title}</div>
        <div class="onboard-text">${s.text}</div>

          <button class="btn btn-primary btn-block" id="onboardNext">${isLast ? '开始学习之旅 🎀' : '下一步'}</button>

        </div>

/* ========== 轻量错题本（P2-3） ========== */
(function () {
  function getMistakes() {
    try { return JSON.parse(localStorage.getItem('studyMistakes') || '[]'); }
    catch (e) { return []; }
  }
  function saveMistakes(list) {
    localStorage.setItem('studyMistakes', JSON.stringify(list));
  }

  window.addMistake = function () {
    const subEl = document.getElementById('mistakeSubject');
    const textEl = document.getElementById('mistakeText');
    const text = (textEl.value || '').trim();
    if (!text) { textEl.focus(); return; }
    const list = getMistakes();
    list.unshift({
      subject: subEl.value,
      text: text,
      date: new Date().toISOString().split('T')[0]
    });
    saveMistakes(list);
    renderDiagnosis();
  };

  window.removeMistake = function (index) {
    const list = getMistakes();
    list.splice(index, 1);
    saveMistakes(list);
    renderDiagnosis();
  };

  const _origRenderDiagnosis = window.renderDiagnosis;
  window.renderDiagnosis = function () {
    _origRenderDiagnosis();
    const el = document.getElementById('tab-diagnosis');
    if (!el || el.querySelector('.mistake-card')) return;
    const list = getMistakes();
    const card = document.createElement('div');
    card.className = 'card mistake-card';
    card.innerHTML = `
      <div class="card-title">📒 我的错题本（${list.length}）</div>
      <div class="mistake-input-row">
        <select id="mistakeSubject" class="mistake-select">
          ${SUBJECTS.map(s => `<option value="${s.name}">${s.icon} ${s.name}</option>`).join('')}
        </select>
        <input type="text" id="mistakeText" class="mistake-input" placeholder="一句话记下错题，如：数列错位相减总忘乘公比" maxlength="60"

      ${list.length === 0
        ? '<div style="font-size:12px;color:var(--text-light);text-align:center;padding:12px 0;">还没有错题记录，遇到错题随手记一句，考前翻一翻～</div>'

            <span class="mistake-tag">${m.subject}</span>

/* ================================================================
   云端模块：账号登录门 + 云同步 + 在线AI固定接入 + 9位老师多音色
   仅在 http(s) 在线模式启用；本地 file:// 双击打开时自动跳过，
   保持纯本地单机可用。
   ================================================================ */
(function () {
  var ONLINE = location.protocol.indexOf('http') === 0;
  var AUTH_KEY = 'studyAuth';
  var SYNC_CODE = 'main';

  /* ---------- 多音色语音：9位老师9种声音 ---------- */
  var VOICE_MAP = {
    chinese:   { prefs: [/Xiaoxiao/i, /Yaoyao/i],                       pitch: 1.00, rate: 0.95 },
    math:      { prefs: [/Yunjian/i, /Yunyang/i, /Kangkang/i],          pitch: 0.95, rate: 1.00 },
    english:   { prefs: [/Xiaoyi/i, /Xiaohan/i, /Google \u666e\u901a\u8bdd/i], pitch: 1.15, rate: 1.05 },
    physics:   { prefs: [/Yunyang/i, /Yunxi/i, /Kangkang/i],            pitch: 1.05, rate: 1.00 },
    chemistry: { prefs: [/Yunxia/i, /Xiaomo/i, /Huihui/i],              pitch: 0.95, rate: 0.98 },
    biology:   { prefs: [/Xiaobei/i, /Xiaoni/i, /Huihui/i],             pitch: 1.10, rate: 1.02 },
    history:   { prefs: [/Yunze/i, /Yunfeng/i, /Kangkang/i],            pitch: 0.85, rate: 0.95 },
    politics:  { prefs: [/Xiaomo/i, /Xiaorui/i, /Yaoyao/i],             pitch: 1.08, rate: 1.02 },
    geography: { prefs: [/Yunxi/i, /Yunze/i, /Kangkang/i],              pitch: 1.00, rate: 1.05 }
  };
  var FALLBACK_PITCH = { chinese: 1.0, math: 0.9, english: 1.2, physics: 1.0, chemistry: 0.92, biology: 1.12, history: 0.85, politics: 1.06, geography: 1.0 };

  function pickTeacherVoice(teacherId) {
    var conf = VOICE_MAP[teacherId] || { prefs: [], pitch: 1.0, rate: 1.0 };
    var voices = ('speechSynthesis' in window) ? speechSynthesis.getVoices() : [];
    var zh = voices.filter(function (v) { return (v.lang || '').toLowerCase().indexOf('zh') === 0; });
    for (var i = 0; i < conf.prefs.length; i++) {
      var hit = zh.find(function (v) { return conf.prefs[i].test(v.name); });
      if (hit) return { voice: hit, pitch: conf.pitch, rate: conf.rate };
    }
    return { voice: zh[0] || null, pitch: (FALLBACK_PITCH[teacherId] || conf.pitch), rate: conf.rate };
  }

  // 重新定义朗读：按当前老师选择不同音色（讲课与答疑共用此入口）
  window.speakMessage = function (msgId, btnEl) {
    if (typeof currentUtterance !== 'undefined' && currentUtterance) {
      speechSynthesis.cancel();
      if (currentTTSBtn) {
        currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
        currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
        currentTTSBtn.classList.remove('speaking');
      }
      if (currentTTSBtn === btnEl) { currentUtterance = null; currentTTSBtn = null; return; }
    }
    var msgEl = document.getElementById(msgId);
    if (!msgEl) return;
    var clone = msgEl.cloneNode(true);
    var ttsBar = clone.querySelector('.tts-bar');
    if (ttsBar) ttsBar.remove();
    var text = clone.textContent || clone.innerText || '';
    if (!text.trim()) return;

    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    var picked = pickTeacherVoice(state.currentTeacher || '');
    if (picked.voice) utterance.voice = picked.voice;
    utterance.pitch = picked.pitch;
    utterance.rate = picked.rate;

    btnEl.querySelector('.tts-label').textContent = '停止';
    btnEl.querySelector('.tts-btn').innerHTML = '&#128263;';
    btnEl.classList.add('speaking');
    currentUtterance = utterance;
    currentTTSBtn = btnEl;
    utterance.onend = utterance.onerror = function () {
      btnEl.querySelector('.tts-label').textContent = '朗读';
      btnEl.querySelector('.tts-btn').innerHTML = '&#128264;';
      btnEl.classList.remove('speaking');
      currentUtterance = null;
      currentTTSBtn = null;
    };
    speechSynthesis.speak(utterance);
  };

  /* ---------- 自动朗读：老师回复即播报，可暂停/继续/停止 ---------- */
  var ttsFloatEl = null, ttsSpeaking = false, ttsPaused = false;

  function isAutoTTS() { return !(state.config && state.config.autoTTS === false); }

  function ensureTTSFloat() {
    if (ttsFloatEl && document.body.contains(ttsFloatEl)) return;
    ttsFloatEl = document.createElement('div');
    ttsFloatEl.id = 'ttsFloat';
    ttsFloatEl.style.cssText = 'position:fixed;right:14px;bottom:14px;z-index:88888;display:none;align-items:center;gap:8px;background:#1e3a8a;color:#fff;padding:8px 10px 8px 14px;border-radius:24px;box-shadow:0 4px 16px rgba(15,23,42,.35);font-size:13px;';
    ttsFloatEl.innerHTML =
      '<span id="ttsFloatLabel">🔊 朗读中</span>' +
      '<button id="ttsPauseBtn" title="暂停/继续" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;cursor:pointer;">⏸</button>' +
      '<button id="ttsStopBtn" title="停止朗读" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;cursor:pointer;">⏹</button>';
    document.body.appendChild(ttsFloatEl);
    document.getElementById('ttsPauseBtn').onclick = function () {
      if (!ttsSpeaking) return;
      var label = document.getElementById('ttsFloatLabel');
      if (ttsPaused) {
        try { speechSynthesis.resume(); } catch (e) {}
        ttsPaused = false; this.textContent = '⏸'; label.textContent = '🔊 朗读中';
      } else {
        try { speechSynthesis.pause(); } catch (e) {}
        ttsPaused = true; this.textContent = '▶'; label.textContent = '⏸ 已暂停';
      }
    };
    document.getElementById('ttsStopBtn').onclick = function () { window.stopTTS(); };
  }

  function showTTSFloat() { ensureTTSFloat(); ttsFloatEl.style.display = 'flex'; }
  function hideTTSFloat() {
    if (ttsFloatEl) ttsFloatEl.style.display = 'none';
    var p = document.getElementById('ttsPauseBtn');
    if (p) p.textContent = '⏸';
    ttsPaused = false; ttsSpeaking = false;
  }

  window.stopTTS = function () {
    try { speechSynthesis.cancel(); } catch (e) {}
    if (typeof currentTTSBtn !== 'undefined' && currentTTSBtn) {
      currentTTSBtn.querySelector('.tts-label').textContent = '朗读';
      currentTTSBtn.querySelector('.tts-btn').innerHTML = '&#128264;';
      currentTTSBtn.classList.remove('speaking');
      currentTTSBtn = null;
    }
    if (typeof currentUtterance !== 'undefined') currentUtterance = null;
    hideTTSFloat();
  };

  window.autoSpeakReply = function (text) {
    if (!isAutoTTS()) return;
    if (!('speechSynthesis' in window)) return;
    if (!text || !text.trim()) return;
    window.stopTTS();
    // 去掉 Markdown 符号，避免把 "#"、"*" 读出来
    var clean = String(text).replace(/[#*>`|\[\]()-]/g, '').replace(/\s+/g, ' ').trim();
    if (!clean) return;
    if (clean.length > 600) clean = clean.slice(0, 600) + '。这段内容比较长，完整版请看屏幕。';
    var utterance = new SpeechSynthesisUtterance(clean);
    utterance.lang = 'zh-CN';
    var picked = pickTeacherVoice(state.currentTeacher || '');
    if (picked.voice) utterance.voice = picked.voice;
    utterance.pitch = picked.pitch;
    utterance.rate = picked.rate;
    ttsSpeaking = true; ttsPaused = false;
    showTTSFloat();
    utterance.onend = utterance.onerror = function () {
      hideTTSFloat();
      if (typeof currentUtterance !== 'undefined') currentUtterance = null;
    };
    currentUtterance = utterance;
    try { speechSynthesis.speak(utterance); } catch (e) { hideTTSFloat(); }
  };

  window.toggleAutoTTS = function () {
    if (!state.config) state.config = {};
    state.config.autoTTS = !isAutoTTS();
    try { saveState(); } catch (e) {}
    if (!state.config.autoTTS) window.stopTTS();
    var b = document.getElementById('autoTTSBtn');
    if (b) {
      var on = isAutoTTS();
      b.textContent = on ? '🔊' : '🔇';
      b.title = '自动朗读：' + (on ? '已开启，点我关闭' : '已关闭，点我开启');
      b.style.background = on ? '' : '#94a3b8';
    }
  };

  if (!ONLINE) return; // 本地模式到此为止

  /* ---------- 在线模式：固定接入后端 ---------- */
  function getToken() { try { return localStorage.getItem(AUTH_KEY) || ''; } catch (e) { return ''; } }
  function setToken(t) { try { localStorage.setItem(AUTH_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(AUTH_KEY); } catch (e) {} }

  function applyBackendConfig() {
    var t = getToken();
    if (!t) return;
    state.config.apiEndpoint = location.origin + '/api/ai';
    state.config.apiKey = t;
    try { localStorage.setItem('studySystem', JSON.stringify(state)); } catch (e) {}
  }

  /* ---------- 登录遮罩 ---------- */
  function showLoginGate() {
    if (document.getElementById('loginGate')) return;
    var gate = document.createElement('div');
    gate.id = 'loginGate';
    gate.innerHTML =
      '<div style="position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0f2557 0%,#1e3a8a 45%,#2563eb 100%);display:flex;align-items:center;justify-content:center;padding:24px;">' +
        '<div style="width:100%;max-width:360px;background:#ffffff;border-radius:16px;padding:36px 28px;box-shadow:0 24px 64px rgba(2,12,45,.45);">' +
          '<div style="text-align:center;margin-bottom:26px;">' +
            '<div style="width:56px;height:56px;margin:0 auto 12px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1e40af);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;">&#128218;</div>' +
            '<div style="font-size:20px;font-weight:700;color:#0f172a;letter-spacing:.5px;">新高二暑假智能学习系统</div>' +
            '<div style="font-size:12px;color:#64748b;margin-top:6px;">请使用账号密码登录后进入学习</div>' +
          '</div>' +
          '<label style="font-size:13px;color:#334155;font-weight:600;">账号</label>' +
          '<input id="lgUser" type="text" inputmode="numeric" autocomplete="username" placeholder="请输入账号" style="width:100%;box-sizing:border-box;margin:6px 0 14px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;">' +
          '<label style="font-size:13px;color:#334155;font-weight:600;">密码</label>' +
          '<input id="lgPass" type="password" autocomplete="current-password" placeholder="请输入密码" style="width:100%;box-sizing:border-box;margin:6px 0 8px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;">' +
          '<div id="lgErr" style="min-height:20px;font-size:12px;color:#dc2626;margin-bottom:6px;"></div>' +
          '<button id="lgBtn" style="width:100%;padding:13px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">登 录</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(gate);

    function doLogin() {
      var u = document.getElementById('lgUser').value.trim();
      var p = document.getElementById('lgPass').value;
      var err = document.getElementById('lgErr');
      var btn = document.getElementById('lgBtn');
      if (!u || !p) { err.textContent = '请输入账号和密码'; return; }
      btn.disabled = true; btn.textContent = '登录中…'; err.textContent = '';
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: u, pass: p })
      }).then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
