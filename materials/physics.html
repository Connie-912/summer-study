<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>物理 · AI智能学伴</title>
<style>
:root{--accent:#d97706;--bg:#eef2f7;--ink:#0f172a;--sub:#64748b;--line:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.85;-webkit-text-size-adjust:100%}

/* 顶栏 + 阅读进度条 */
.topbar{position:sticky;top:0;z-index:10;background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(15,23,42,.18)}
.topbar-row{display:flex;align-items:center;gap:12px;padding:14px 16px}
.topbar .back{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:14px;cursor:pointer}
.topbar h1{font-size:17px;font-weight:600;color:#fff;margin:0;padding:0;border:none;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress{height:3px;background:rgba(255,255,255,.25)}
.progress i{display:block;height:100%;width:0;background:#fff;transition:width .1s linear}

.wrap{max-width:760px;margin:0 auto;padding:16px 14px 80px}

/* 封面 */
.hero{background:var(--accent);color:#fff;border-radius:16px;padding:30px 24px;margin-bottom:18px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero::before{content:"";position:absolute;right:30px;bottom:-60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-tag{display:inline-block;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px;font-size:12px;letter-spacing:2px;margin-bottom:12px}
.hero h2{color:#fff;font-size:24px;border:none;padding:0;margin:0 0 8px;line-height:1.4}
.hero-sub{font-size:14px;opacity:.85;margin-bottom:16px}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap}
.hero-meta span{background:rgba(255,255,255,.15);padding:5px 12px;border-radius:8px;font-size:12.5px}

/* 专题卡片 */
.page{background:#fff;border-radius:14px;padding:24px 22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(15,23,42,.07);border-top:4px solid var(--accent)}
.wrap h1{font-size:19px;color:var(--accent);margin:0 0 12px;padding:10px 14px;background:#f1f5f9;border-left:5px solid var(--accent);border-radius:8px;line-height:1.5}
.wrap h2{font-size:16px;margin:20px 0 10px;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:8px}
.wrap h2 .sec-ic{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;color:#fff;font-size:12px;flex:none}
.sec-core{background:#eff6ff;color:#1d4ed8} .sec-core .sec-ic{background:#2563eb}
.sec-example{background:#fffbeb;color:#b45309} .sec-example .sec-ic{background:#d97706}
.sec-practice{background:#ecfeff;color:#0e7490} .sec-practice .sec-ic{background:#0891b2}
.sec-warn{background:#fef2f2;color:#b91c1c} .sec-warn .sec-ic{background:#dc2626}
.sec-answer{background:#ecfdf5;color:#047857} .sec-answer .sec-ic{background:#059669}
.wrap h3{font-size:14px;margin:14px 0 6px;display:inline-block;padding:3px 12px;border-radius:6px;font-weight:600}
.h3-example{background:#fef3c7;color:#92400e}
.h3-answer{background:#d1fae5;color:#065f46}
.h3-point{background:#dbeafe;color:#1e40af}
.wrap p{font-size:15.5px;margin:8px 0;text-align:justify;color:#1e293b}

/* 浮动按钮与目录 */
.floaters{position:fixed;right:14px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:20}
.fbtn{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;box-shadow:0 4px 12px rgba(15,23,42,.3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.toc-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:30;opacity:0;pointer-events:none;transition:opacity .25s}
.toc{position:fixed;top:0;right:-300px;width:280px;height:100%;background:#fff;z-index:31;transition:right .25s;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(15,23,42,.2)}
.toc.open{right:0}
.toc-mask.show{opacity:1;pointer-events:auto}
.toc-head{padding:16px;border-bottom:1px solid var(--line);font-weight:600;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.toc-head button{border:none;background:none;font-size:20px;color:#94a3b8;cursor:pointer}
.toc-body{flex:1;overflow-y:auto;padding:8px 0}
.toc a{display:block;padding:10px 18px;color:var(--ink);text-decoration:none;font-size:14px;border-left:3px solid transparent}
.toc a.lv2{padding-left:34px;color:var(--sub);font-size:13px}
.toc a:active,.toc a:hover{background:#f1f5f9;border-left-color:var(--accent);color:var(--accent)}
</style>
<style>.hero-illu{width:100%;border-radius:12px;margin:0 0 16px;display:block;box-shadow:0 4px 16px rgba(15,23,42,.15)}</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row"><button class="back" onclick="history.back()">‹ 返回</button><h1>物理学习</h1></div>
  <div class="progress"><i id="progressBar"></i></div>
</div>
<div class="wrap">
<div class="hero" style="padding-top:16px"><img class="hero-illu" src="img/sub-physics.jpg" alt=""><div class="hero-tag">AI智能学伴 · 物理</div><h2>物理 · AI智能学伴</h2><div class="hero-sub">每专题一页 · 精编讲练 · 1:1 还原教辅排版</div><div class="hero-meta"><span>📚 8 个专题</span><span>📄 63 页</span></div></div>
<div style="font-size:13px;color:#475569;margin:0 4px 10px;font-weight:600;">📖 专题目录（每专题一页 · 精编讲练）</div><a href="topics/physics-01.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">匀变速直线运动</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">10页 ›</span></a><a href="topics/physics-02.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">相互作用与受力分析</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">7页 ›</span></a><a href="topics/physics-03.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">牛顿运动定律</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">10页 ›</span></a><a href="topics/physics-04.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">曲线运动与平抛运动</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">6页 ›</span></a><a href="topics/physics-05.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">圆周运动</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">6页 ›</span></a><a href="topics/physics-06.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">万有引力与航天</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">6页 ›</span></a><a href="topics/physics-07.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">功和能</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">10页 ›</span></a><a href="topics/physics-08.html" style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;color:#0f172a;box-shadow:0 1px 3px rgba(15,23,42,.08);border-left:4px solid #d97706;"><span style="font-size:15px;font-weight:600;">静电场预习</span><span style="font-size:12px;color:#64748b;white-space:nowrap;margin-left:8px;">7页 ›</span></a>
</div>
<div class="floaters">
<button class="fbtn" id="tocBtn" title="目录">☰</button>
<button class="fbtn" id="topBtn" title="回顶部" style="background:#475569">↑</button>
</div>
<div class="toc-mask" id="tocMask"></div>
<nav class="toc" id="tocPanel">
<div class="toc-head"><span>📑 本册目录</span><button id="tocClose">×</button></div>
<div class="toc-body" id="tocList"></div>
</nav>
<script>
(function(){
  var heads=document.querySelectorAll('.wrap h1,.wrap h2'),list=document.getElementById('tocList');
  heads.forEach(function(h,i){h.id='sec-'+i;
    var a=document.createElement('a');a.href='#sec-'+i;a.textContent=h.textContent;
    if(h.tagName==='H2')a.className='lv2';
    a.addEventListener('click',function(){closeToc()});
    list.appendChild(a);});
  var panel=document.getElementById('tocPanel'),mask=document.getElementById('tocMask');
  function openToc(){panel.classList.add('open');mask.classList.add('show')}
  function closeToc(){panel.classList.remove('open');mask.classList.remove('show')}
  document.getElementById('tocBtn').addEventListener('click',openToc);
  document.getElementById('tocClose').addEventListener('click',closeToc);
  mask.addEventListener('click',closeToc);
  document.getElementById('topBtn').addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});
  var bar=document.getElementById('progressBar');
  window.addEventListener('scroll',function(){
    var h=document.documentElement;
    var max=h.scrollHeight-h.clientHeight;
    bar.style.width=(max>0?(h.scrollTop/max*100):0)+'%';
  },{passive:true});
})();
</script>
</body>
</html>
